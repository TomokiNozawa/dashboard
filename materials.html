<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1117; --card: #161b22; --card-hover: #1c2129;
  --border: #30363d; --border-light: #21262d;
  --text: #e6edf3; --text2: #8b949e; --text3: #6e7681;
  --blue: #58a6ff; --green: #3fb950; --yellow: #d29922; --red: #f85149; --purple: #bc8cff; --orange: #f0883e;
  --radius: 8px;
}
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }

/* Login */
.login-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg);
  display: flex; justify-content: center; align-items: center;
}
.login-container {
  text-align: center; padding: 48px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  max-width: 400px; width: 90%;
}
.login-container h1 {
  font-size: 20px; font-weight: 700; margin-bottom: 8px;
  background: linear-gradient(135deg, #e6edf3, #58a6ff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.login-container p { font-size: 13px; color: var(--text2); margin-bottom: 24px; }
.login-input {
  width: 100%; padding: 12px 16px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 14px;
  outline: none; transition: border-color 0.2s;
}
.login-input:focus { border-color: var(--blue); }
.login-btn {
  width: 100%; padding: 12px; margin-top: 16px;
  background: linear-gradient(135deg, #238636, #3fb950);
  border: none; border-radius: 8px; color: white;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
}
.login-btn:hover { opacity: 0.9; }
.login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.login-error { color: var(--red); font-size: 13px; margin-top: 12px; display: none; }
.login-loading { color: var(--text2); font-size: 13px; margin-top: 12px; display: none; }

/* ── Side Nav ── */
.side-nav {
  position: fixed; top: 0; left: 0; width: 56px; height: 100vh;
  background: var(--card); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 8px 0; z-index: 200; overflow: hidden;
  transition: width 0.2s ease;
}
.side-nav:hover { width: 140px; }
.side-nav-item {
  display: flex; align-items: center; gap: 8px; width: 100%;
  padding: 10px 16px; color: var(--text3); text-decoration: none;
  font-size: 11px; font-weight: 600; white-space: nowrap; overflow: hidden;
  border-radius: 0; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
.side-nav-item:hover { background: var(--card-hover); color: var(--text); }
.side-nav-item.active { color: var(--blue); background: rgba(88,166,255,0.08); border-right: 2px solid var(--blue); }
.side-nav-item span:last-child { opacity: 0; transition: opacity 0.15s; }
.side-nav:hover .side-nav-item span:last-child { opacity: 1; }

/* Main App */
.container { max-width: 1200px; margin: 0 auto; padding: 24px 20px 100px; padding-left: 76px; }
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Header */
.page-header { display: flex; align-items: center; gap: 16px; margin-bottom: 32px; padding-bottom: 16px; border-bottom: 1px solid var(--border-light); flex-wrap: wrap; }
.back-btn { padding: 6px 14px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text2); font-size: 13px; cursor: pointer; transition: all 0.2s; text-decoration: none; display: inline-block; }
.back-btn:hover { background: var(--card-hover); color: var(--text); text-decoration: none; }
.page-header h1 { font-size: 22px; font-weight: 700; }
.page-header .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

/* Summary Cards */
.summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 32px; }
.summary-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; text-align: center; }
.summary-val { font-size: 28px; font-weight: 700; }
.summary-label { font-size: 12px; color: var(--text3); margin-top: 4px; }

/* Tables */
.table-wrap { border-radius: var(--radius); border: 1px solid var(--border-light); }
table.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th, .data-table td { padding: 10px 12px; border-bottom: 1px solid var(--border-light); text-align: center; }
.data-table th { background: var(--card); color: var(--text2); font-weight: 600; position: sticky; top: 0; z-index: 2; white-space: nowrap; cursor: pointer; user-select: none; box-shadow: 0 1px 0 var(--border-light); }
.data-table th:hover { color: var(--text); }
.data-table td { background: var(--bg); }
.data-table tbody tr:hover td { background: var(--card); }
.data-table .text-left { text-align: left; }
.row-done td { opacity: 0.45; }

/* Status badges */
.badge { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer; user-select: none; transition: all 0.15s; }
.badge:hover { transform: scale(1.08); }
.badge-gforms { background: rgba(63,185,80,0.15); color: var(--green); }
.badge-tforms { background: rgba(88,166,255,0.15); color: var(--blue); }
.badge-done { background: rgba(63,185,80,0.15); color: var(--green); }
.badge-pending { background: rgba(248,81,73,0.15); color: var(--red); }

/* Day info */
.day-info { font-size: 12px; white-space: nowrap; }
.day-count { font-weight: 600; color: var(--purple); }
.day-dates { color: var(--text2); margin-left: 4px; }

/* Per-day badges */
.day-badges { display: flex; gap: 4px; justify-content: center; flex-wrap: wrap; }
.day-badge { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; cursor: pointer; user-select: none; transition: all 0.15s; white-space: nowrap; }
.day-badge:hover { transform: scale(1.08); }
.day-badge-done { background: rgba(63,185,80,0.15); color: var(--green); }
.day-badge-pending { background: rgba(248,81,73,0.15); color: var(--red); }

/* Save Button */
.save-fab {
  position: fixed; bottom: 24px; right: 24px; z-index: 100;
  display: none; align-items: center; gap: 8px;
  padding: 14px 24px;
  background: linear-gradient(135deg, #238636, #3fb950);
  border: none; border-radius: 12px;

}
.save-fab:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(63,185,80,0.4); }
.save-fab:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.save-badge { background: rgba(255,255,255,0.25); padding: 2px 8px; border-radius: 10px; font-size: 11px; }

/* Reload */
.reload-btn {
  padding: 8px 16px;
  background: linear-gradient(135deg, #1f6feb, #58a6ff);
  border: none; border-radius: 8px;
  color: white; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
}
.reload-btn:hover { opacity: 0.9; }

/* Toast */
.toast {
  position: fixed; top: 70px; right: 24px; z-index: 200;
  padding: 12px 20px; border-radius: var(--radius);
  font-size: 13px; font-weight: 500;
  transform: translateX(120%); transition: transform 0.3s ease;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
}
.toast.show { transform: translateX(0); }
.toast-success { background: #238636; color: white; }
.toast-error { background: var(--red); color: white; }

/* Sync Modal */
.modal-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.7); display: flex;
  justify-content: center; align-items: center;
}
.modal {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 24px; max-width: 600px; width: 90%;
  max-height: 80vh; overflow-y: auto;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.modal h2 { font-size: 16px; margin-bottom: 16px; }
.modal-info { font-size: 12px; color: var(--text2); margin-bottom: 16px; }
.diff-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
.diff-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px; background: var(--bg);
  border: 1px solid var(--border-light); border-radius: 6px;
  font-size: 13px;
}
.diff-item label { display: flex; align-items: center; gap: 8px; flex: 1; cursor: pointer; }
.diff-item input[type="checkbox"] { accent-color: var(--green); width: 16px; height: 16px; }
.diff-arrow { color: var(--yellow); font-weight: 600; font-size: 12px; white-space: nowrap; }
.diff-status { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; }
.diff-status-done { background: rgba(63,185,80,0.15); color: var(--green); }
.diff-status-pending { background: rgba(248,81,73,0.15); color: var(--red); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.modal-btn {
  padding: 8px 20px; border: none; border-radius: 6px;
  font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
}
.modal-btn:hover { opacity: 0.85; }
.modal-btn-primary { background: linear-gradient(135deg, #238636, #3fb950); color: white; }
.modal-btn-secondary { background: var(--border); color: var(--text2); }
.sync-status { font-size: 11px; color: var(--text3); margin-left: 8px; }

/* Loading */
@keyframes loadFadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes loadSlide { 0% { transform: translateX(-100%); } 100% { transform: translateX(400%); } }
.load-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 70vh; gap: 24px; animation: loadFadeIn 0.5s ease;
}
.load-logo { font-size: 32px; font-weight: 700; background: linear-gradient(135deg, #e6edf3, #58a6ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.load-sub { font-size: 14px; color: var(--text3); }
.load-bar { width: 200px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.load-bar-inner { width: 40%; height: 100%; background: var(--blue); border-radius: 2px; animation: loadSlide 1.2s ease infinite; }

/* Responsive */
@media (max-width: 768px) {
  .container { padding: 16px 12px 100px; }
  .page-header h1 { font-size: 18px; }
  .summary { grid-template-columns: repeat(2, 1fr); }
  .summary-val { font-size: 22px; }
  .data-table { font-size: 11px; }
  .data-table th, .data-table td { padding: 8px 6px; }
  .badge { font-size: 10px; padding: 2px 6px; }
  .side-nav { display: none; }
  .container { padding-left: 12px; }
}
</style>

<script>
// ============================================================
// Config
// ============================================================
const API_BASE = 'https://api.github.com';
const REPO = 'TomokiNozawa/dashboard-data';
const FILE_PATH = 'materials-data.json';
const SESSION_TIMEOUT = 4 * 60 * 60 * 1000; // 4h

const SHEETS_SPREADSHEET_ID = '1ZAyQWtU1N5rByZuSAGvZs8t6kwWL2g0de1__5b6yark';
const SHEETS_HEADER_ROW = 5; // 0-based
const SHEETS_COL_DATE = 0;
const SHEETS_COL_COMPANY = 6;
const SHEETS_COL_CONTENT = 8;
const SHEETS_COL_MATERIAL_SEND = 24; // Y column

const FIREBASE_DB_URL = 'https://task-board-fbf1e-default-rtdb.asia-southeast1.firebasedatabase.app';

let pat = null;
let sheetsCreds = null; // { refresh_token, client_id, client_secret, token_uri }
let sheetsAccessToken = null;
let materialsData = null;
let fileSha = null;
let changeCount = 0;
let sortState = { column: 'days', direction: 'asc' };
let pendingSyncDiffs = []; // for modal

// ============================================================
// Authentication (shared with shift.html via sessionStorage)
// ============================================================
async function init() {
  const storedPass = sessionStorage.getItem('dk_pass');
  const storedTs = sessionStorage.getItem('dk_ts');

  if (storedPass && storedTs) {
    const elapsed = Date.now() - parseInt(storedTs, 10);
    if (elapsed < SESSION_TIMEOUT) {
      try {
        pat = await decryptPAT(storedPass);
        try { sheetsCreds = JSON.parse(await decryptFile(storedPass, 'encrypted-sheets.json')); } catch(e) { console.warn('Sheets creds not available:', e); }
        sessionStorage.setItem('dk_ts', Date.now().toString());
        showApp();
        return;
      } catch (e) {
        sessionStorage.removeItem('dk_pass');
        sessionStorage.removeItem('dk_ts');
      }
    } else {
      sessionStorage.removeItem('dk_pass');
      sessionStorage.removeItem('dk_ts');
    }
  }
  showLogin();
}

function showLogin() {
  document.getElementById('loginOverlay').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  const pwInput = document.getElementById('loginPassword');
  pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('loginBtn').addEventListener('click', doLogin);
  setTimeout(() => pwInput.focus(), 100);
}

async function doLogin() {
  const password = document.getElementById('loginPassword').value;
  if (!password) return;
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('loginError');
  const loadEl = document.getElementById('loginLoading');
  btn.disabled = true;
  errEl.style.display = 'none';
  loadEl.style.display = 'block';

  try {
    pat = await decryptPAT(password);
    try { sheetsCreds = JSON.parse(await decryptFile(password, 'encrypted-sheets.json')); } catch(e) { console.warn('Sheets creds not available:', e); }
    sessionStorage.setItem('dk_pass', password);
    sessionStorage.setItem('dk_ts', Date.now().toString());
    showApp();
  } catch (e) {
    errEl.style.display = 'block';
    loadEl.style.display = 'none';
    btn.disabled = false;
    document.getElementById('loginPassword').select();
  }
}

async function decryptPAT(password) {
  const resp = await fetch('encrypted-pat.json');
  const payload = await resp.json();
  const salt = Uint8Array.from(atob(payload.salt), c => c.charCodeAt(0));
  const iv = Uint8Array.from(atob(payload.iv), c => c.charCodeAt(0));
  const encData = Uint8Array.from(atob(payload.data), c => c.charCodeAt(0));
  const keyMaterial = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey({ name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' }, keyMaterial, { name: 'AES-CBC', length: 256 }, false, ['decrypt']);
  const decrypted = await crypto.subtle.decrypt({ name: 'AES-CBC', iv }, key, encData);
  const token = new TextDecoder().decode(decrypted).replace(/[\x00-\x1f]/g, '').trim();
  if (!token || token.length < 10) throw new Error('Invalid');
  return token;
}

async function decryptFile(password, filename) {
  const resp = await fetch(filename);
  const payload = await resp.json();
  const salt = Uint8Array.from(atob(payload.salt), c => c.charCodeAt(0));
  const iv = Uint8Array.from(atob(payload.iv), c => c.charCodeAt(0));
  const encData = Uint8Array.from(atob(payload.data), c => c.charCodeAt(0));
  const keyMaterial = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey({ name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' }, keyMaterial, { name: 'AES-CBC', length: 256 }, false, ['decrypt']);
  const decrypted = await crypto.subtle.decrypt({ name: 'AES-CBC', iv }, key, encData);
  return new TextDecoder().decode(decrypted).replace(/[\x00-\x1f]/g, '').trim();
}

// ============================================================
// Google Sheets API
// ============================================================
async function getSheetsAccessToken() {
  if (!sheetsCreds) return null;
  // Try existing token
  if (sheetsAccessToken) {
    try {
      const testResp = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEETS_SPREADSHEET_ID}?fields=spreadsheetId`, {
        headers: { 'Authorization': `Bearer ${sheetsAccessToken}` }
      });
      if (testResp.ok) return sheetsAccessToken;
    } catch(e) {}
  }
  // Refresh
  const body = new URLSearchParams({
    grant_type: 'refresh_token',
    refresh_token: sheetsCreds.refresh_token,
    client_id: sheetsCreds.client_id,
    client_secret: sheetsCreds.client_secret,
  });
  const resp = await fetch(sheetsCreds.token_uri, { method: 'POST', body });
  if (!resp.ok) throw new Error('Sheets token refresh failed');
  const data = await resp.json();
  sheetsAccessToken = data.access_token;
  return sheetsAccessToken;
}

function getSheetName() {
  const now = new Date();
  const fy = now.getMonth() >= 3 ? now.getFullYear() : now.getFullYear() - 1;
  return `${fy}年`;
}

function parseSheetDate(dateStr, fy) {
  if (!dateStr || !String(dateStr).includes('/')) return null;
  const parts = String(dateStr).split('/');
  if (parts.length !== 2) return null;
  const m = parseInt(parts[0]), d = parseInt(parts[1]);
  if (isNaN(m) || isNaN(d)) return null;
  const y = m >= 4 ? fy : fy + 1;
  return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function normalizeCompany(name) {
  let s = String(name).trim().replace(/[\s　]+/g, '').replace(/株式会社|\(株\)|（株）/g, '');
  s = s.replace(/[Ａ-Ｚａ-ｚ０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
  return s.toUpperCase();
}

function companyMatch(a, b) {
  const na = normalizeCompany(a), nb = normalizeCompany(b);
  if (na === nb) return true;
  if (na.includes(nb) || nb.includes(na)) return true;
  const minLen = Math.min(na.length, nb.length);
  if (minLen >= 3 && na.slice(0, minLen) === nb.slice(0, minLen)) return true;
  return false;
}

async function readSheetSentStatus() {
  const token = await getSheetsAccessToken();
  if (!token) throw new Error('Sheets認証情報がありません');
  const sheetName = getSheetName();
  const range = encodeURIComponent(sheetName);
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEETS_SPREADSHEET_ID}/values/${range}?majorDimension=ROWS`;
  const resp = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
  if (!resp.ok) throw new Error(`Sheets API error: ${resp.status}`);
  const data = await resp.json();
  const rows = data.values || [];
  const now = new Date();
  const fy = now.getMonth() >= 3 ? now.getFullYear() : now.getFullYear() - 1;
  const result = [];
  for (let i = SHEETS_HEADER_ROW + 1; i < rows.length; i++) {
    const row = rows[i];
    const dateStr = (row[SHEETS_COL_DATE] || '').trim();
    const dateIso = parseSheetDate(dateStr, fy);
    if (!dateIso) continue;
    const company = (row[SHEETS_COL_COMPANY] || '').trim();
    if (!company) continue;
    const materialSend = (row[SHEETS_COL_MATERIAL_SEND] || '').trim();
    result.push({ row: i + 1, date: dateIso, company, materialSend: materialSend === '済' });
  }
  return result;
}

async function writeSheetSentStatus(updates) {
  // updates: [{row: 1-based, value: "済" or ""}]
  if (!updates.length) return;
  const token = await getSheetsAccessToken();
  if (!token) throw new Error('Sheets認証情報がありません');
  const sheetName = getSheetName();
  const body = {
    valueInputOption: 'RAW',
    data: updates.map(u => ({
      range: `${sheetName}!Y${u.row}`,
      values: [[u.value]]
    }))
  };
  const resp = await fetch(
    `https://sheets.googleapis.com/v4/spreadsheets/${SHEETS_SPREADSHEET_ID}/values:batchUpdate`,
    { method: 'POST', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
  );
  if (!resp.ok) throw new Error(`Sheets write error: ${resp.status}`);
  return await resp.json();
}

function matchSheetToDashboard(sheetRows) {
  // Returns matched pairs: [{sheetRow, training, dayObj, sheetSent, dashSent}]
  const dashLookup = {};
  materialsData.trainings.forEach(t => {
    t.days.forEach(d => {
      const key = d.date;
      if (!dashLookup[key]) dashLookup[key] = [];
      dashLookup[key].push({ t, d });
    });
  });
  const matched = [];
  for (const sr of sheetRows) {
    const candidates = dashLookup[sr.date] || [];
    for (const { t, d } of candidates) {
      if (companyMatch(t.company, sr.company)) {
        const sentObj = getSentObj(t);
        matched.push({
          sheetRow: sr.row,
          company: t.company,
          dayN: d.n,
          date: d.date,
          sheetSent: sr.materialSend,
          dashSent: !!sentObj[String(d.n)],
          training: t,
        });
        break;
      }
    }
  }
  return matched;
}

// ============================================================
// Firebase TaskBoard Sync
// ============================================================
async function syncTaskBoard(sentUpdates) {
  // sentUpdates: [{company, date, dayN, sent(bool)}] - items that changed to sent=true
  if (!sentUpdates.length) return 0;

  // Fetch all tasks from Firebase
  const resp = await fetch(`${FIREBASE_DB_URL}/tasks.json`);
  if (!resp.ok) throw new Error(`Firebase read error: ${resp.status}`);
  const allTasks = await resp.json();
  if (!allTasks) return 0;

  let updated = 0;
  const patchOps = {};

  for (const [taskId, task] of Object.entries(allTasks)) {
    if (!task) continue;
    const isMatSend = task.ruleId === 'material_send' || task.stepType === 'material_send';
    if (!isMatSend) continue;
    if (task.status === 'done') continue;

    // Match by company + training date
    for (const u of sentUpdates) {
      if (task.trainingDate === u.date && companyMatch(task.company || '', u.company)) {
        patchOps[`tasks/${taskId}/status`] = 'done';
        patchOps[`tasks/${taskId}/completedAt`] = { '.sv': 'timestamp' };
        patchOps[`tasks/${taskId}/updatedAt`] = { '.sv': 'timestamp' };
        updated++;
        break;
      }
    }
  }

  if (updated > 0) {
    // Use multi-path update
    const patchResp = await fetch(`${FIREBASE_DB_URL}/.json`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(patchOps),
    });
    if (!patchResp.ok) throw new Error(`Firebase write error: ${patchResp.status}`);
  }
  return updated;
}

async function readTaskBoardDoneStatus() {
  // Fetch material_create and material_send tasks from Firebase
  const resp = await fetch(`${FIREBASE_DB_URL}/tasks.json`);
  if (!resp.ok) throw new Error(`Firebase read error: ${resp.status}`);
  const allTasks = await resp.json();
  if (!allTasks) return [];

  const results = [];
  for (const [taskId, task] of Object.entries(allTasks)) {
    if (!task) continue;
    const rid = task.ruleId || ''; const st = task.stepType || '';
    if (rid !== 'material_create' && rid !== 'material_send' && st !== 'material_create' && st !== 'material_send') continue;
    if (task.status !== 'done') continue;
    results.push({
      ruleId: task.ruleId,
      company: task.company || '',
      trainingDate: task.trainingDate || '',
      trainingType: task.trainingType || '',
    });
  }
  return results;
}

function matchTaskBoardToDashboard(doneTasks) {
  // Returns diffs where TaskBoard says done but dashboard says not done
  // ruleId/stepType "material_create" → dashboard created, "material_send" → dashboard sent
  const diffs = [];

  for (const task of doneTasks) {
    // Find matching training+day by company + date
    for (const t of materialsData.trainings) {
      if (!companyMatch(t.company, task.company)) continue;
      for (const d of t.days) {
        if (d.date !== task.trainingDate) continue;
        const dayKey = String(d.n);

        if ((task.ruleId === 'material_create' || task.stepType === 'material_create') && !t.created[dayKey]) {
          diffs.push({
            source: 'TaskBoard',
            type: 'created',
            company: t.company,
            dayN: d.n,
            date: d.date,
            training: t,
          });
        }
        if (task.ruleId === 'material_send' || task.stepType === 'material_send') {
          const sentObj = getSentObj(t);
          if (!sentObj[dayKey]) {
            diffs.push({
              source: 'TaskBoard',
              type: 'sent',
              company: t.company,
              dayN: d.n,
              date: d.date,
              training: t,
            });
          }
        }
      }
    }
  }
  return diffs;
}

// ============================================================
// Sync Diff Modal
// ============================================================
function showSyncDiffModal(sheetDiffs, tbDiffs) {
  const sheetConflicts = (sheetDiffs || []).filter(d => d.sheetSent !== d.dashSent);
  const tbConflicts = tbDiffs || [];

  const allDiffs = [];

  for (const d of sheetConflicts) {
    if (d.sheetSent && !d.dashSent) {
      allDiffs.push({ ...d, field: 'sent', description: `スプシでは送付済になっています。このダッシュボードの「送付」を済にしますか？` });
    } else {
      allDiffs.push({ ...d, field: 'sent', description: `ダッシュボードでは送付済ですが、スプシはまだ未です。スプシを済に更新しますか？` });
    }
  }
  for (const d of tbConflicts) {
    const label = d.type === 'created' ? '作成' : '送付';
    allDiffs.push({ ...d, field: d.type, description: `TaskBoardで「教材${label}」タスクが完了済です。このダッシュボードの「${label}」を済にしますか？` });
  }

  if (!allDiffs.length) {
    showToast('全データ同期済み（差分なし）', 'success');
    return;
  }

  pendingSyncDiffs = allDiffs;

  document.getElementById('syncModalTitle').textContent = `外部データとの差分（${allDiffs.length}件）`;
  document.getElementById('syncModalInfo').textContent = 'チェックを入れた項目を反映します。';

  const listEl = document.getElementById('syncDiffList');
  listEl.innerHTML = allDiffs.map((d, i) => {
    const dateStr = d.date.slice(5).replace(/-/g, '/');
    const fieldLabel = d.field === 'created' ? '作成' : '送付';
    return `<div class="diff-item" style="flex-direction:column;align-items:flex-start;gap:6px;">
      <label style="width:100%;">
        <input type="checkbox" checked data-diff-idx="${i}">
        <strong>${esc(d.company)}</strong>　Day${d.dayN} (${dateStr})　<span class="diff-status diff-status-pending" style="font-size:10px;">${fieldLabel}: 未 → 済</span>
      </label>
      <span style="font-size:11px;color:var(--text2);padding-left:26px;">${esc(d.description)}</span>
    </div>`;
  }).join('');

  document.getElementById('syncModal').style.display = 'flex';
}

function closeSyncModal() {
  document.getElementById('syncModal').style.display = 'none';
  pendingSyncDiffs = [];
}

async function applySyncDiff() {
  const checkboxes = document.querySelectorAll('#syncDiffList input[type="checkbox"]');
  const selected = [];
  checkboxes.forEach(cb => {
    if (cb.checked) selected.push(pendingSyncDiffs[parseInt(cb.dataset.diffIdx)]);
  });
  if (!selected.length) { closeSyncModal(); return; }

  const btn = document.getElementById('syncApplyBtn');
  btn.disabled = true;
  btn.textContent = '同期中...';

  try {
    const sheetUpdates = [];
    let dashChanged = false;

    for (const d of selected) {
      if (d.source === 'TaskBoard') {
        // TaskBoard → Dashboard
        const dayKey = String(d.dayN);
        if (d.field === 'created') {
          d.training.created[dayKey] = true;
        } else {
          const sentObj = getSentObj(d.training);
          sentObj[dayKey] = true;
        }
        dashChanged = true;
      } else if (d.sheetSent && !d.dashSent) {
        // Sheet → Dashboard
        const sentObj = getSentObj(d.training);
        sentObj[String(d.dayN)] = true;
        dashChanged = true;
      } else if (d.dashSent && !d.sheetSent) {
        // Dashboard → Sheet
        sheetUpdates.push({ row: d.sheetRow, value: '済' });
      }
    }

    // Write to sheet
    if (sheetUpdates.length) {
      await writeSheetSentStatus(sheetUpdates);
    }

    // Save dashboard if changed
    if (dashChanged) {
      // Save to GitHub silently
      materialsData.lastEditedInBrowser = new Date().toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo', year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' }).replace(/\//g, '-');
      const jsonStr = JSON.stringify(materialsData, null, 2);
      const utf8Bytes = new TextEncoder().encode(jsonStr);
      let binaryStr = '';
      utf8Bytes.forEach(b => binaryStr += String.fromCharCode(b));
      const content = btoa(binaryStr);
      const resp = await fetch(`${API_BASE}/repos/${REPO}/contents/${FILE_PATH}`, {
        method: 'PUT', headers: apiHeaders(),
        body: JSON.stringify({ message: '教材データ更新（スプシ同期）', content, sha: fileSha })
      });
      if (resp.ok) {
        const result = await resp.json();
        fileSha = result.content.sha;
      }
    }

    // Sync TaskBoard for items now marked as sent
    const newlySent = selected.filter(d => d.sheetSent || d.dashSent);
    if (newlySent.length) {
      try {
        await syncTaskBoard(newlySent.map(d => ({ company: d.company, date: d.date, dayN: d.dayN })));
      } catch (e) { console.error('TaskBoard sync error:', e); }
    }

    renderApp();
    closeSyncModal();
    const total = selected.length;
    showToast(`${total}件の変更を同期しました`, 'success');
  } catch (e) {
    showToast('同期に失敗: ' + e.message, 'error');
  }
  btn.disabled = false;
  btn.textContent = '選択した変更を反映';
}

// ============================================================
// GitHub API
// ============================================================
function apiHeaders() {
  return { 'Authorization': `token ${pat}`, 'Accept': 'application/vnd.github.v3+json' };
}

async function loadData() {
  const url = `${API_BASE}/repos/${REPO}/contents/${FILE_PATH}?t=${Date.now()}`;
  const resp = await fetch(url, { headers: apiHeaders(), cache: 'no-store' });
  if (!resp.ok) throw new Error(`API error ${resp.status}`);
  const json = await resp.json();
  fileSha = json.sha;
  const binary = atob(json.content.replace(/\n/g, ''));
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  materialsData = JSON.parse(new TextDecoder('utf-8').decode(bytes));
}

async function saveData() {
  const fab = document.getElementById('saveFab');
  fab.disabled = true;
  fab.textContent = '保存中...';

  try {
    materialsData.lastEditedInBrowser = new Date().toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo', year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' }).replace(/\//g, '-');
    const jsonStr = JSON.stringify(materialsData, null, 2);
    const utf8Bytes = new TextEncoder().encode(jsonStr);
    let binaryStr = '';
    utf8Bytes.forEach(b => binaryStr += String.fromCharCode(b));
    const content = btoa(binaryStr);

    const resp = await fetch(`${API_BASE}/repos/${REPO}/contents/${FILE_PATH}`, {
      method: 'PUT',
      headers: apiHeaders(),
      body: JSON.stringify({ message: '教材データ更新（ブラウザ編集）', content, sha: fileSha })
    });

    if (resp.status === 409) {
      showToast('他で更新されています。再読み込みしてください。', 'error');
      fab.disabled = false;
      fab.innerHTML = '保存 <span class="save-badge" id="saveBadge">' + changeCount + '</span>';
      return;
    }
    if (!resp.ok) throw new Error(`Save failed: ${resp.status}`);

    const result = await resp.json();
    fileSha = result.content.sha;
    changeCount = 0;
    updateSaveBadge();

    // Auto-sync sent status to spreadsheet + TaskBoard
    if (sheetsCreds) {
      try {
        fab.textContent = 'スプシ同期中...';
        const sheetRows = await readSheetSentStatus();
        const matched = matchSheetToDashboard(sheetRows);
        const sheetUpdates = [];
        const sentItems = []; // for TaskBoard sync
        for (const m of matched) {
          if (m.dashSent && !m.sheetSent) {
            sheetUpdates.push({ row: m.sheetRow, value: '済' });
            sentItems.push({ company: m.company, date: m.date, dayN: m.dayN });
          }
        }
        if (sheetUpdates.length) {
          await writeSheetSentStatus(sheetUpdates);
        }

        // Also sync TaskBoard: mark matching material_send tasks as done
        fab.textContent = 'TaskBoard同期中...';
        // Collect ALL sent=true items (not just newly changed) for TaskBoard
        const allSentItems = matched.filter(m => m.dashSent).map(m => ({ company: m.company, date: m.date, dayN: m.dayN }));
        let tbUpdated = 0;
        try {
          tbUpdated = await syncTaskBoard(allSentItems);
        } catch (e) {
          console.error('TaskBoard sync error:', e);
        }

        const msgs = [];
        if (sheetUpdates.length) msgs.push(`スプシ${sheetUpdates.length}件`);
        if (tbUpdated) msgs.push(`TaskBoard${tbUpdated}件`);
        showToast(msgs.length ? `保存 + ${msgs.join(' + ')}同期` : '保存しました', 'success');
      } catch (e) {
        console.error('Sheet sync error:', e);
        showToast('保存OK（同期失敗: ' + e.message + '）', 'error');
      }
    } else {
      showToast('保存しました', 'success');
    }
  } catch (e) {
    showToast('保存に失敗: ' + e.message, 'error');
  }
  fab.disabled = false;
  fab.innerHTML = '保存 <span class="save-badge" id="saveBadge">' + changeCount + '</span>';
}

async function reloadData() {
  if (changeCount > 0 && !confirm('未保存の変更があります。再読み込みしますか？')) return;
  try {
    await loadData();
    changeCount = 0;
    renderApp();
    updateSaveBadge();

    // Check spreadsheet + TaskBoard diff
    {
      let sheetDiffs = [];
      let tbDiffs = [];

      // Spreadsheet diff
      if (sheetsCreds) {
        try {
          showToast('スプシ・TaskBoard照合中...', 'success');
          const sheetRows = await readSheetSentStatus();
          const matched = matchSheetToDashboard(sheetRows);
          sheetDiffs = matched.filter(m => m.sheetSent !== m.dashSent);
        } catch (e) {
          console.error('Sheet read error:', e);
        }
      }

      // TaskBoard diff
      try {
        const doneTasks = await readTaskBoardDoneStatus();
        tbDiffs = matchTaskBoardToDashboard(doneTasks);
      } catch (e) {
        console.error('TaskBoard read error:', e);
      }

      if (sheetDiffs.length || tbDiffs.length) {
        showSyncDiffModal(sheetDiffs, tbDiffs);
      } else {
        showToast('再読込完了（全データ同期済み）', 'success');
      }
    }
  } catch (e) {
    showToast('再読み込み失敗: ' + e.message, 'error');
  }
}

// ============================================================
// Render
// ============================================================
function renderApp() {
  renderSummary();
  renderTable();
  document.getElementById('lastEditInfo').textContent = '最終編集: ' + (materialsData.lastEditedInBrowser || '-');
}

// Migrate sent: boolean → sent: {"1":bool,"2":bool,...} per day
function getSentObj(t) {
  if (typeof t.sent === 'object' && t.sent !== null) return t.sent;
  const obj = {};
  t.days.forEach(d => { obj[String(d.n)] = !!t.sent; });
  t.sent = obj;
  return obj;
}

function renderSummary() {
  const t = materialsData.trainings;
  const total = t.length;
  const totalDays = t.reduce((s, x) => s + x.days.length, 0);
  const createdDays = t.reduce((s, x) => s + Object.values(x.created).filter(v => v).length, 0);
  const sentDays = t.reduce((s, x) => s + Object.values(getSentObj(x)).filter(v => v).length, 0);

  document.getElementById('sumTrainings').textContent = total;
  document.getElementById('sumDays').textContent = totalDays;

  const createdEl = document.getElementById('sumCreated');
  createdEl.textContent = `${createdDays}/${totalDays}`;
  createdEl.style.color = createdDays === totalDays ? 'var(--green)' : createdDays >= totalDays / 2 ? 'var(--yellow)' : 'var(--red)';

  const sentEl = document.getElementById('sumSent');
  sentEl.textContent = `${sentDays}/${totalDays}`;
  sentEl.style.color = sentDays === totalDays ? 'var(--green)' : sentDays >= totalDays / 2 ? 'var(--yellow)' : 'var(--red)';
}

function renderTable() {
  const tbody = document.getElementById('tableBody');

  // Flatten: 1 row per Day
  const rows = [];
  materialsData.trainings.forEach((t, idx) => {
    t.days.forEach(d => {
      rows.push({ t, idx, d });
    });
  });

  // Sort
  rows.sort((a, b) => {
    let va, vb;
    switch (sortState.column) {
      case 'company': va = a.t.company; vb = b.t.company; break;
      case 'content': va = a.t.content; vb = b.t.content; break;
      case 'day': va = a.d.n; vb = b.d.n; break;
      case 'date': va = a.d.date; vb = b.d.date; break;
      case 'formType': va = a.t.formType; vb = b.t.formType; break;
      case 'created': va = a.t.created[String(a.d.n)] ? 1 : 0; vb = b.t.created[String(b.d.n)] ? 1 : 0; break;
      case 'sent': va = getSentObj(a.t)[String(a.d.n)] ? 1 : 0; vb = getSentObj(b.t)[String(b.d.n)] ? 1 : 0; break;
      default: va = a.d.date; vb = b.d.date;
    }
    const cmp = typeof va === 'string' ? va.localeCompare(vb) : va - vb;
    return sortState.direction === 'asc' ? cmp : -cmp;
  });

  tbody.innerHTML = rows.map(({ t, idx, d }) => {
    const created = t.created[String(d.n)];
    const sentObj = getSentObj(t);
    const daySent = sentObj[String(d.n)];
    const isDone = created && daySent;

    const dateStr = `${d.date.slice(5)}(${d.dow})`;

    const formBadge = t.formType === 'Google Forms'
      ? `<span class="badge badge-gforms" onclick="toggleForm(${idx})">G Forms</span>`
      : `<span class="badge badge-tforms" onclick="toggleForm(${idx})">T Forms</span>`;

    const createdBadge = created
      ? `<span class="badge badge-done" onclick="toggleCreated(${idx},${d.n})">&#10003; 済</span>`
      : `<span class="badge badge-pending" onclick="toggleCreated(${idx},${d.n})">— 未</span>`;

    const sentBadge = daySent
      ? `<span class="badge badge-done" onclick="toggleSent(${idx},${d.n})">&#10003; 済</span>`
      : `<span class="badge badge-pending" onclick="toggleSent(${idx},${d.n})">— 未</span>`;

    return `<tr class="${isDone ? 'row-done' : ''}">
      <td class="text-left">${esc(t.company)}</td>
      <td class="text-left">${esc(t.content)}</td>
      <td><span class="day-count">Day${d.n}</span></td>
      <td>${dateStr}</td>
      <td>${formBadge}</td>
      <td>${createdBadge}</td>
      <td>${sentBadge}</td>
    </tr>`;
  }).join('');

  // Sort arrows
  document.querySelectorAll('#materialsTable th').forEach(th => {
    const col = th.dataset.col;
    const arrow = col === sortState.column ? (sortState.direction === 'asc' ? ' ↑' : ' ↓') : '';
    th.textContent = th.textContent.replace(/ [↑↓]$/, '') + arrow;
  });
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ============================================================
// Actions
// ============================================================
function toggleForm(idx) {
  const t = materialsData.trainings[idx];
  t.formType = t.formType === 'Google Forms' ? 'Teams Forms' : 'Google Forms';
  markChanged();
}

function toggleCreated(idx, dayN) {
  const key = String(dayN);
  materialsData.trainings[idx].created[key] = !materialsData.trainings[idx].created[key];
  markChanged();
}

function toggleSent(idx, dayN) {
  const key = String(dayN);
  const sentObj = getSentObj(materialsData.trainings[idx]);
  sentObj[key] = !sentObj[key];
  markChanged();
}

function markChanged() {
  changeCount++;
  updateSaveBadge();
  renderApp();
}

function updateSaveBadge() {
  const fab = document.getElementById('saveFab');
  const badge = document.getElementById('saveBadge');
  if (changeCount > 0) {
    fab.style.display = 'flex';
    badge.textContent = changeCount;
  } else {
    fab.style.display = 'none';
  }
}

// ============================================================
// Sort
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('#materialsTable th').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (!col) return;
      if (sortState.column === col) {
        sortState.direction = sortState.direction === 'asc' ? 'desc' : 'asc';
      } else {
        sortState.column = col;
        sortState.direction = 'asc';
      }
      renderTable();
    });
  });
});

// ============================================================
// Toast
// ============================================================
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast toast-${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ============================================================
// Start
// ============================================================
init();
</script>
</body>
</html>
