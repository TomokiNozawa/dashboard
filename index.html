<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NozaBoard</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0d1117;
  color: #e6edf3;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding-left: 56px;
}
.login-container {
  text-align: center;
  padding: 48px;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 12px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  max-width: 400px;
  width: 90%;
}
.login-container h1 {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #e6edf3, #58a6ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.login-container p {
  font-size: 13px;
  color: #8b949e;
  margin-bottom: 24px;
}
.login-input {
  width: 100%;
  padding: 12px 16px;
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 8px;
  color: #e6edf3;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.login-input:focus { border-color: #58a6ff; }
.login-btn {
  width: 100%;
  padding: 12px;
  margin-top: 16px;
  background: linear-gradient(135deg, #238636, #3fb950);
  border: none;
  border-radius: 8px;
  color: white;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}
.login-btn:hover { opacity: 0.9; }
.login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.error { color: #f85149; font-size: 13px; margin-top: 12px; display: none; }
.loading { color: #8b949e; font-size: 13px; margin-top: 12px; display: none; }

/* ── Side Nav ── */
.side-nav {
  position: fixed; top: 0; left: 0; width: 56px; height: 100vh;
  background: #161b22; border-right: 1px solid #30363d;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 8px 0; z-index: 200; overflow: hidden;
  transition: width 0.2s ease;
}
.side-nav:hover { width: 140px; }
.side-nav-item {
  display: flex; align-items: center; gap: 8px; width: 100%;
  padding: 10px 16px; color: #6e7681; text-decoration: none;
  font-size: 11px; font-weight: 600; white-space: nowrap; overflow: hidden;
  border-radius: 0; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
.side-nav-item:hover { background: #1c2129; color: #e6edf3; }
.side-nav-item.active { color: #58a6ff; background: rgba(88,166,255,0.08); border-right: 2px solid #58a6ff; }
.side-nav-item span:last-child { opacity: 0; transition: opacity 0.15s; }
.side-nav:hover .side-nav-item span:last-child { opacity: 1; }

@media (max-width: 768px) {
  .side-nav { display: none; }
  body { padding-left: 0; }
}
</style>
</head>
<body>

<nav class="side-nav" id="sideNav">
  <a class="side-nav-item active" href="index.html" title="NozaBoard">
    <svg viewBox="0 0 100 100" width="22" height="22"><defs><linearGradient id="sng" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#5aadff"/><stop offset="100%" stop-color="#b88cff"/></linearGradient></defs><rect width="100" height="100" rx="22" fill="url(#sng)"/><text x="50" y="68" text-anchor="middle" fill="#fff" font-family="Inter,sans-serif" font-weight="700" font-size="52">N</text></svg>
    <span>NozaBoard</span>
  </a>
  <a class="side-nav-item" href="task-board.html" title="タスクボード">
    <span style="font-size:18px">&#9745;</span>
    <span>タスク</span>
  </a>
  <a class="side-nav-item" href="materials.html" title="教材作成">
    <span style="font-size:18px">&#128230;</span>
    <span>教材</span>
  </a>
  <a class="side-nav-item" href="shift.html" title="シフト管理">
    <span style="font-size:18px">&#128101;</span>
    <span>シフト</span>
  </a>
</nav>

<div class="login-container" id="loginScreen">
  <h1>NozaBoard</h1>
  <p>業務自動化ダッシュボード</p>
  <input type="password" class="login-input" id="passwordInput" placeholder="パスワードを入力" autofocus>
  <button class="login-btn" id="loginBtn" onclick="unlock()">ログイン</button>
  <div class="error" id="error">パスワードが正しくありません</div>
  <div class="loading" id="loading">復号中...</div>
</div>

<script>
document.getElementById('passwordInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') unlock();
});

async function decryptAndShow(password) {
  const resp = await fetch('encrypted.json');
  const payload = await resp.json();

  const salt = Uint8Array.from(atob(payload.salt), c => c.charCodeAt(0));
  const iv = Uint8Array.from(atob(payload.iv), c => c.charCodeAt(0));
  const encData = Uint8Array.from(atob(payload.data), c => c.charCodeAt(0));

  const keyMaterial = await crypto.subtle.importKey(
    'raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']
  );
  const key = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-CBC', length: 256 },
    false,
    ['decrypt']
  );

  const decrypted = await crypto.subtle.decrypt({ name: 'AES-CBC', iv }, key, encData);
  const html = new TextDecoder().decode(decrypted);

  if (!html.includes('<!DOCTYPE html>') && !html.includes('<html')) {
    throw new Error('Invalid password');
  }

  localStorage.setItem('dk_pass', password);
  localStorage.setItem('dk_ts', Date.now().toString());

  document.open();
  document.write(html);
  document.close();

  // Inject side nav after page load
  setTimeout(() => {
    if (document.getElementById('sideNav')) return; // Already has nav
    const nav = document.createElement('nav');
    nav.id = 'sideNav';
    nav.className = 'side-nav';
    nav.innerHTML = `
      <a class="side-nav-item active" href="index.html" title="NozaBoard">
        <svg viewBox="0 0 100 100" width="22" height="22"><defs><linearGradient id="sng" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#5aadff"/><stop offset="100%" stop-color="#b88cff"/></linearGradient></defs><rect width="100" height="100" rx="22" fill="url(#sng)"/><text x="50" y="68" text-anchor="middle" fill="#fff" font-family="Inter,sans-serif" font-weight="700" font-size="52">N</text></svg>
        <span>NozaBoard</span>
      </a>
      <a class="side-nav-item" href="task-board.html" title="タスクボード"><span style="font-size:18px">&#9745;</span><span>タスク</span></a>
      <a class="side-nav-item" href="materials.html" title="教材作成"><span style="font-size:18px">&#128230;</span><span>教材</span></a>
      <a class="side-nav-item" href="shift.html" title="シフト管理"><span style="font-size:18px">&#128101;</span><span>シフト</span></a>
    `;
    const style = document.createElement('style');
    style.textContent = `
      .side-nav { position:fixed;top:0;left:0;width:56px;height:100vh;background:#161b22;border-right:1px solid #30363d;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0;z-index:200;overflow:hidden;transition:width 0.2s ease; }
      .side-nav:hover { width:140px; }
      .side-nav-item { display:flex;align-items:center;gap:8px;width:100%;padding:10px 16px;color:#6e7681;text-decoration:none;font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;transition:all 0.2s;line-height:1; }
      .side-nav-item span:first-child,.side-nav-item svg { display:flex;align-items:center;justify-content:center;width:22px;height:22px;flex-shrink:0; }
      .side-nav-item:hover { background:#1c2129;color:#e6edf3; }
      .side-nav-item.active { color:#58a6ff;background:rgba(88,166,255,0.08);border-right:2px solid #58a6ff; }
      .side-nav-item span:last-child { opacity:0;transition:opacity 0.15s; }
      .side-nav:hover .side-nav-item span:last-child { opacity:1; }
      @media(max-width:768px){.side-nav{display:none;}}
    `;
    document.head.appendChild(style);
    document.body.prepend(nav);
    document.body.style.paddingLeft = '56px';

    // Theme toggle
    const saved = localStorage.getItem('noza_theme');
    if (saved === 'light') document.body.classList.add('light');
    const tbtn = document.createElement('button');
    tbtn.className = 'theme-toggle';
    tbtn.innerHTML = '&#9681;';
    tbtn.title = 'テーマ切替';
    tbtn.onclick = () => { document.body.classList.toggle('light'); localStorage.setItem('noza_theme', document.body.classList.contains('light') ? 'light' : 'dark'); };
    document.body.appendChild(tbtn);
  }, 100);
}

async function unlock() {
  const password = document.getElementById('passwordInput').value;
  if (!password) return;

  const btn = document.getElementById('loginBtn');
  const error = document.getElementById('error');
  const loading = document.getElementById('loading');
  btn.disabled = true;
  error.style.display = 'none';
  loading.style.display = 'block';

  try {
    await decryptAndShow(password);
  } catch (e) {
    error.style.display = 'block';
    loading.style.display = 'none';
    btn.disabled = false;
    document.getElementById('passwordInput').select();
  }
}

// Auto-login if session exists
(async function() {
  const storedPass = localStorage.getItem('dk_pass');
  const storedTs = localStorage.getItem('dk_ts');
  if (storedPass && storedTs) {
    const elapsed = Date.now() - parseInt(storedTs, 10);
    if (elapsed < 30 * 24 * 60 * 60 * 1000) {
      try {
        await decryptAndShow(storedPass);
      } catch (e) {
        localStorage.removeItem('dk_pass');
        localStorage.removeItem('dk_ts');
      }
    }
  }
})();
</script>
</body>
</html>
