<title>DIK&Company 業務自動化ダッシュボード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #0d1117;
  --bg-card: #161b22;
  --bg-card-hover: #1c2129;
  --bg-modal: #1c2129;
  --border: #30363d;
  --border-light: #21262d;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-muted: #6e7681;
  --accent-blue: #58a6ff;
  --accent-green: #3fb950;
  --accent-yellow: #d29922;
  --accent-red: #f85149;
  --accent-purple: #bc8cff;
  --accent-orange: #f0883e;
  --gradient-blue: linear-gradient(135deg, #58a6ff, #1f6feb);
  --gradient-green: linear-gradient(135deg, #3fb950, #238636);
  --gradient-progress: linear-gradient(90deg, #238636, #3fb950, #58a6ff);
  --radius: 8px;
  --radius-lg: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.4);
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.container { max-width: 1200px; margin: 0 auto; padding: 24px 20px 60px; }

/* ── Header ── */
.header { text-align: center; padding: 48px 0 40px; position: relative; }
.header::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 80px; height: 2px; background: var(--gradient-blue); border-radius: 1px; }
.header-label { display: inline-block; font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--accent-blue); background: rgba(88,166,255,0.1); padding: 4px 12px; border-radius: 20px; margin-bottom: 16px; }
.header h1 { font-size: clamp(1.5rem, 4vw, 2.25rem); font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px; background: linear-gradient(135deg, var(--text-primary), var(--accent-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.header-meta { font-size: 13px; color: var(--text-secondary); margin-bottom: 28px; }
.header-meta span { color: var(--text-muted); }

.overall-progress { max-width: 480px; margin: 0 auto; }
.overall-progress-label { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; font-size: 13px; }
.overall-progress-label .label { color: var(--text-secondary); font-weight: 500; }
.overall-progress-label .value { color: var(--accent-blue); font-weight: 600; font-size: 14px; }
.progress-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: var(--gradient-progress); border-radius: 4px; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
.progress-bar-fill::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent); animation: shimmer 2s infinite; }
@keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

/* ── Stats ── */
.stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-top: 24px; }
.stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; text-align: center; cursor: pointer; transition: all var(--transition); }
.stat-card:hover { background: var(--bg-card-hover); transform: translateY(-2px); box-shadow: var(--shadow); }
.stat-value { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
.stat-value.blue { color: var(--accent-blue); }
.stat-value.green { color: var(--accent-green); }
.stat-value.yellow { color: var(--accent-yellow); }
.stat-value.purple { color: var(--accent-purple); }
.stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; font-weight: 500; }

/* ── Section ── */
.section { margin-top: 48px; }
.section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border-light); }
.section-icon { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: var(--radius); font-size: 16px; flex-shrink: 0; }
.section-header h2 { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
.section-header .count { margin-left: auto; font-size: 12px; color: var(--text-muted); background: var(--border-light); padding: 2px 10px; border-radius: 12px; }

/* ── Cards (clickable) ── */
.tool-card, .task-card, .skill-card, .workflow-card, .checklist-item {
  cursor: pointer;
  transition: all var(--transition);
}

/* ── Tool Grid ── */
.tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
.tool-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; display: flex; align-items: center; gap: 10px; }
.tool-card:hover { background: var(--bg-card-hover); border-color: #3d444d; transform: translateY(-1px); box-shadow: var(--shadow); }
.tool-icon { font-size: 18px; flex-shrink: 0; }
.tool-status { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; position: relative; }
.tool-status.active { background: var(--accent-green); box-shadow: 0 0 8px rgba(63,185,80,0.4); }
.tool-status.active::after { content: ''; position: absolute; inset: -3px; border-radius: 50%; border: 1px solid rgba(63,185,80,0.2); }
.tool-status.pending { background: var(--accent-yellow); box-shadow: 0 0 8px rgba(210,153,34,0.3); }
.tool-status.inactive { background: var(--text-muted); }
.tool-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }

/* ── Kanban Board ── */
.kanban { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.kanban-column { background: rgba(22,27,34,0.5); border: 1px solid var(--border-light); border-radius: var(--radius-lg); padding: 16px; min-height: 200px; }
.kanban-column-header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid transparent; }
.kanban-column-header.pending { border-bottom-color: var(--text-muted); }
.kanban-column-header.in-progress { border-bottom-color: var(--accent-yellow); }
.kanban-column-header.completed { border-bottom-color: var(--accent-green); }
.kanban-column-title { font-size: 14px; font-weight: 600; }
.kanban-column-count { font-size: 11px; background: var(--border-light); color: var(--text-muted); padding: 2px 8px; border-radius: 10px; margin-left: auto; }
.kanban-cards { display: flex; flex-direction: column; gap: 8px; }
.task-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
.task-card:hover { background: var(--bg-card-hover); border-color: #3d444d; transform: translateY(-2px); box-shadow: var(--shadow); }
.task-card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.task-number { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 6px; background: var(--border-light); font-size: 11px; font-weight: 600; color: var(--text-secondary); flex-shrink: 0; }
.task-title { font-size: 13px; font-weight: 500; }
.task-notes { font-size: 11px; color: var(--text-muted); line-height: 1.5; }
@media (max-width: 900px) { .kanban { grid-template-columns: 1fr; } }

/* ── Badges ── */
.badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.badge-completed { background: rgba(63,185,80,0.12); color: var(--accent-green); border: 1px solid rgba(63,185,80,0.2); }
.badge-in-progress { background: rgba(210,153,34,0.12); color: var(--accent-yellow); border: 1px solid rgba(210,153,34,0.2); }
.badge-pending { background: rgba(139,148,158,0.1); color: var(--text-secondary); border: 1px solid rgba(139,148,158,0.15); }

/* ── Skills Grid ── */
.skills-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.skill-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; }
.skill-card:hover { background: var(--bg-card-hover); border-color: #3d444d; transform: translateY(-1px); box-shadow: var(--shadow); }
.skill-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.skill-card-header code { font-size: 13px; font-weight: 600; color: var(--accent-blue); background: rgba(88,166,255,0.08); padding: 2px 8px; border-radius: 4px; font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace; }
.skill-invocable { font-size: 10px; background: rgba(63,185,80,0.12); color: var(--accent-green); padding: 2px 6px; border-radius: 4px; }
.skill-desc { font-size: 12px; color: var(--text-muted); line-height: 1.5; }

/* ── Checklist ── */
.checklist { display: flex; flex-direction: column; gap: 6px; }
.checklist-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; }
.checklist-item:hover { background: var(--bg-card-hover); }
.checkbox { width: 18px; height: 18px; border: 2px solid var(--border); border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.checkbox.checked { background: var(--accent-green); border-color: var(--accent-green); }
.checkbox.checked::after { content: ''; width: 6px; height: 10px; border: 2px solid white; border-top: 0; border-left: 0; transform: rotate(45deg) translateY(-1px); }
.checklist-text { font-weight: 400; }
.checklist-text.done { text-decoration: line-through; color: var(--text-muted); }

/* ── Workflow ── */
.workflow-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; display: flex; align-items: center; gap: 20px; }
.workflow-card:hover { background: var(--bg-card-hover); border-color: #3d444d; }
.workflow-icon { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; background: rgba(63,185,80,0.1); border-radius: var(--radius); font-size: 22px; flex-shrink: 0; }
.workflow-info { flex: 1; min-width: 0; }
.workflow-name { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
.workflow-desc { font-size: 13px; color: var(--text-secondary); }
.workflow-detail { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
.workflow-status { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.workflow-dot { width: 10px; height: 10px; border-radius: 50%; animation: pulse 2s infinite; }
.workflow-dot.running { background: var(--accent-green); box-shadow: 0 0 8px rgba(63,185,80,0.5); }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
.workflow-status-text { font-size: 12px; font-weight: 600; color: var(--accent-green); }

/* ── Modal ── */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
.modal-overlay.active { display: flex; animation: fadeIn 0.2s ease; }
.modal { background: var(--bg-modal); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 32px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; box-shadow: 0 16px 48px rgba(0,0,0,0.5); }
.modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
.modal-title { font-size: 20px; font-weight: 700; }
.modal-close { background: none; border: none; color: var(--text-muted); font-size: 24px; cursor: pointer; padding: 4px 8px; border-radius: var(--radius); transition: all var(--transition); }
.modal-close:hover { color: var(--text-primary); background: var(--border-light); }
.modal-body { font-size: 14px; color: var(--text-secondary); line-height: 1.8; }
.modal-body h3 { color: var(--text-primary); font-size: 15px; font-weight: 600; margin: 16px 0 8px; }
.modal-body h3:first-child { margin-top: 0; }
.modal-body .detail-row { display: flex; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--border-light); }
.modal-body .detail-label { color: var(--text-muted); min-width: 100px; font-weight: 500; }
.modal-body .detail-value { color: var(--text-primary); }
.modal-body ul { padding-left: 20px; margin: 8px 0; }
.modal-body li { margin: 4px 0; }

/* ── Footer ── */
.footer { text-align: center; margin-top: 64px; padding-top: 24px; border-top: 1px solid var(--border-light); font-size: 12px; color: var(--text-muted); }

/* ── Responsive ── */
@media (max-width: 768px) {
  .container { padding: 16px 12px 40px; }
  .header { padding: 32px 0 32px; }
  .section { margin-top: 36px; }
  .tools-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
  .skills-grid { grid-template-columns: 1fr; }
  .task-card { grid-template-columns: 28px 1fr; gap: 12px; }
  .workflow-card { flex-direction: column; text-align: center; }
  .stats-bar { grid-template-columns: repeat(2, 1fr); }
}

/* ── Animations ── */
.fade-in { opacity: 0; transform: translateY(12px); animation: fadeIn 0.5s ease forwards; }
@keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
</style>
</head>

// ── Modal ──
function openModal(title, bodyHtml) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('modalOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function showToolDetail(tool) {
  const statusMap = { active: '稼働中', pending: '未設定', inactive: '無効' };
  const statusColor = { active: 'var(--accent-green)', pending: 'var(--accent-yellow)', inactive: 'var(--text-muted)' };
  openModal(`${tool.icon} ${tool.name}`, `
    <div class="detail-row"><span class="detail-label">状態</span><span class="detail-value" style="color:${statusColor[tool.status]}">${statusMap[tool.status]}</span></div>
    <h3>詳細</h3><p>${tool.details}</p>
  `);
}
function showTaskDetail(task) {
  const statusMap = { completed: '完了', 'in-progress': '進行中', pending: '未着手' };
  const badgeClass = { completed: 'badge-completed', 'in-progress': 'badge-in-progress', pending: 'badge-pending' };
  openModal(`#${task.id} ${task.title}`, `
    <div class="detail-row"><span class="detail-label">状態</span><span class="detail-value"><span class="badge ${badgeClass[task.status]}">${statusMap[task.status]}</span></span></div>
    <div class="detail-row"><span class="detail-label">備考</span><span class="detail-value">${task.notes}</span></div>
    <h3>詳細</h3><p>${task.details}</p>
  `);
}
function showSkillDetail(skill) {
  openModal(skill.name, `
    <div class="detail-row"><span class="detail-label">呼び出し</span><span class="detail-value">${skill.invocable ? '<span class="badge badge-completed">スラッシュコマンド対応</span>' : '<span class="badge badge-pending">内部スキル</span>'}</span></div>
    <div class="detail-row"><span class="detail-label">概要</span><span class="detail-value">${skill.desc}</span></div>
    <h3>詳細</h3><p>${skill.details}</p>
  `);
}
function showSetupDetail(item) {
  openModal(item.text, `
    <div class="detail-row"><span class="detail-label">状態</span><span class="detail-value">${item.done ? '<span class="badge badge-completed">完了</span>' : '<span class="badge badge-pending">未完了</span>'}</span></div>
    <h3>手順</h3><p>${item.details}</p>
  `);
}
function showWorkflowDetail(wf) {
  openModal(wf.name, `
    <div class="detail-row"><span class="detail-label">状態</span><span class="detail-value" style="color:var(--accent-green)">稼働中</span></div>
    <div class="detail-row"><span class="detail-label">スケジュール</span><span class="detail-value">${wf.detail}</span></div>
    <div class="detail-row"><span class="detail-label">概要</span><span class="detail-value">${wf.desc}</span></div>
    <h3>詳細</h3><p>${wf.details}</p>
  `);
}

// ── Render ──

    </header>

    <div class="stats-bar fade-in">
      <div class="stat-card"><div class="stat-value blue">${activeTools}</div><div class="stat-label">連携ツール</div></div>
      <div class="stat-card"><div class="stat-value green">${completedTasks}</div><div class="stat-label">完了タスク</div></div>
      <div class="stat-card"><div class="stat-value yellow">${inProgressTasks}</div><div class="stat-label">進行中</div></div>
      <div class="stat-card"><div class="stat-value purple">${data.skills.length}</div><div class="stat-label">Skills</div></div>
    </div>

    <section class="section fade-in">
      <div class="section-header">
        <div class="section-icon" style="background:rgba(88,166,255,0.1);color:var(--accent-blue);">🔗</div>
        <h2>ツール連携状況</h2>
        <span class="count">${activeTools}/${data.tools.length} 稼働中</span>
      </div>
      <div class="tools-grid">
        ${data.tools.map((t,i) => `

            <span class="tool-icon">${t.icon}</span>
            <span class="tool-name">${t.name}</span>
            <div class="tool-status ${t.status}"></div>
          </div>
        `).join("")}

    </section>

    <section class="section fade-in">
      <div class="section-header">
        <div class="section-icon" style="background:rgba(63,185,80,0.1);color:var(--accent-green);">📋</div>
        <h2>自動化タスク</h2>
        <span class="count">${completedTasks}完了 / ${inProgressTasks}進行中 / ${pendingTasks}未着手</span>
      </div>
      <div class="kanban">
        ${[
          { key: 'pending', label: '未着手', icon: '○' },
          { key: 'in-progress', label: '進行中', icon: '◉' },

          const colTasks = data.tasks.filter(t => t.status === col.key);
          return `

                <span>${col.icon}</span>

                <span class="kanban-column-count">${colTasks.length}</span>
              </div>
              <div class="kanban-cards">
                ${colTasks.map(t => {
                  const idx = data.tasks.indexOf(t);
                  return `
                    <div class="task-card" onclick="showTaskDetail(data.tasks[${idx}])">

                      <div class="task-notes">${t.notes}</div>
                    </div>
                  `;
                }).join("")}
              </div>
            </div>
          `;
        }).join("")}
      </div>
    </section>

    <section class="section fade-in">
      <div class="section-header">
        <div class="section-icon" style="background:rgba(188,140,255,0.1);color:var(--accent-purple);">⚡</div>
        <h2>Skills 一覧</h2>

        ${data.skills.map((s,i) => `

            <div class="checkbox ${s.done ? 'checked' : ''}"></div>
            <span class="checklist-text ${s.done ? 'done' : ''}">${s.text}</span>

      ${data.workflows.map((w,i) => `

    </section>

    <footer class="footer">DIK&Company &middot; Powered by Claude Code &middot; ${new Date().getFullYear()}</footer>

  document.querySelectorAll('.fade-in').forEach((el, i) => { el.style.animationDelay = `${i * 0.08}s`; });

document.addEventListener("DOMContentLoaded", render);
</script>
