<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NozaBoard</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0d1117;
  color: #e6edf3;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}
.login-container {
  text-align: center;
  padding: 48px;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 12px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  max-width: 400px;
  width: 90%;
}
.login-container h1 {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #e6edf3, #58a6ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.login-container p {
  font-size: 13px;
  color: #8b949e;
  margin-bottom: 24px;
}
.login-input {
  width: 100%;
  padding: 12px 16px;
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 8px;
  color: #e6edf3;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.login-input:focus { border-color: #58a6ff; }
.login-btn {
  width: 100%;
  padding: 12px;
  margin-top: 16px;
  background: linear-gradient(135deg, #238636, #3fb950);
  border: none;
  border-radius: 8px;
  color: white;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}
.login-btn:hover { opacity: 0.9; }
.login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.error { color: #f85149; font-size: 13px; margin-top: 12px; display: none; }
.loading { color: #8b949e; font-size: 13px; margin-top: 12px; display: none; }
</style>
</head>
<body>
<div class="login-container" id="loginScreen">
  <h1>NozaBoard</h1>
  <p>業務自動化ダッシュボード</p>
  <input type="password" class="login-input" id="passwordInput" placeholder="パスワードを入力" autofocus>
  <button class="login-btn" id="loginBtn" onclick="unlock()">ログイン</button>
  <div class="error" id="error">パスワードが正しくありません</div>
  <div class="loading" id="loading">復号中...</div>
</div>

<script>
document.getElementById('passwordInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') unlock();
});

async function decryptAndShow(password) {
  const resp = await fetch('encrypted.json');
  const payload = await resp.json();

  const salt = Uint8Array.from(atob(payload.salt), c => c.charCodeAt(0));
  const iv = Uint8Array.from(atob(payload.iv), c => c.charCodeAt(0));
  const encData = Uint8Array.from(atob(payload.data), c => c.charCodeAt(0));

  const keyMaterial = await crypto.subtle.importKey(
    'raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']
  );
  const key = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-CBC', length: 256 },
    false,
    ['decrypt']
  );

  const decrypted = await crypto.subtle.decrypt({ name: 'AES-CBC', iv }, key, encData);
  const html = new TextDecoder().decode(decrypted);

  if (!html.includes('<!DOCTYPE html>') && !html.includes('<html')) {
    throw new Error('Invalid password');
  }

  sessionStorage.setItem('dk_pass', password);
  sessionStorage.setItem('dk_ts', Date.now().toString());

  document.open();
  document.write(html);
  document.close();
}

async function unlock() {
  const password = document.getElementById('passwordInput').value;
  if (!password) return;

  const btn = document.getElementById('loginBtn');
  const error = document.getElementById('error');
  const loading = document.getElementById('loading');
  btn.disabled = true;
  error.style.display = 'none';
  loading.style.display = 'block';

  try {
    await decryptAndShow(password);
  } catch (e) {
    error.style.display = 'block';
    loading.style.display = 'none';
    btn.disabled = false;
    document.getElementById('passwordInput').select();
  }
}

// Auto-login if session exists
(async function() {
  const storedPass = sessionStorage.getItem('dk_pass');
  const storedTs = sessionStorage.getItem('dk_ts');
  if (storedPass && storedTs) {
    const elapsed = Date.now() - parseInt(storedTs, 10);
    if (elapsed < 4 * 60 * 60 * 1000) {
      try {
        await decryptAndShow(storedPass);
      } catch (e) {
        sessionStorage.removeItem('dk_pass');
        sessionStorage.removeItem('dk_ts');
      }
    }
  }
})();
</script>
</body>
</html>
