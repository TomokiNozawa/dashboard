      afterModalEdit();
      refreshModal(reopenFn, ...reopenArgs);
    }
  }
}

// -- Calendar day modal (EDITABLE, Timeline view) --
function openCalendarDayModal(day) {
  const [yearStr, monthStr] = (currentMonthKey || '2026-04').split('-');
  const year = parseInt(yearStr, 10);
  const month = parseInt(monthStr, 10);
  const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  const dowIdx = new Date(year, month - 1, day).getDay();
  const dow = JP_DAY_NAMES[dowIdx];

  const daySchedules = shiftData.schedule.filter(s => s.date === dateStr);

  // Determine timeline range
  let minHour = 24, maxHour = 0;
  daySchedules.forEach(s => {
    const sh = parseInt(s.start.split(':')[0], 10);
    const eh = parseInt(s.end.split(':')[0], 10);
    const em = parseInt(s.end.split(':')[1] || '0', 10);
    if (sh < minHour) minHour = sh;
    if ((eh + (em > 0 ? 1 : 0)) > maxHour) maxHour = eh + (em > 0 ? 1 : 0);
  });
  if (daySchedules.length === 0) { minHour = 8; maxHour = 18; }
  minHour = Math.max(minHour - 1, 0);
  maxHour = Math.min(maxHour + 1, 24);
  const totalHours = maxHour - minHour;
  const hourHeight = 60; // px per hour

  // Compute columns for overlapping events
  const sorted = [...daySchedules].sort((a, b) => a.start.localeCompare(b.start));
  const columns = [];
  sorted.forEach(s => {
    const sh = parseFloat(s.start.replace(':', '.'));
    const eh = parseFloat(s.end.replace(':', '.'));
    let placed = false;
    for (let c = 0; c < columns.length; c++) {
      const lastInCol = columns[c][columns[c].length - 1];
      const lastEnd = parseFloat(lastInCol.end.replace(':', '.'));
      if (sh >= lastEnd) { columns[c].push(s); s._col = c; placed = true; break; }
    }
    if (!placed) { s._col = columns.length; columns.push([s]); }
  });
  const totalCols = Math.max(columns.length, 1);

  // Build timeline
  let timelineHtml = '';
  for (let h = minHour; h < maxHour; h++) {
    timelineHtml += `<div class="timeline-hour"><span class="timeline-hour-label">${String(h).padStart(2,'0')}:00</span></div>`;
  }

  // Build events
  let eventsHtml = '';
  daySchedules.forEach(s => {
    const origIdx = shiftData.schedule.indexOf(s);
    const sh = parseInt(s.start.split(':')[0], 10);
    const sm = parseInt(s.start.split(':')[1] || '0', 10);
    const eh = parseInt(s.end.split(':')[0], 10);
    const em = parseInt(s.end.split(':')[1] || '0', 10);
    const topMin = (sh - minHour) * 60 + sm;
    const durMin = (eh - sh) * 60 + (em - sm);
    const top = topMin;
    const height = Math.max(durMin, 20);

    const assigned = s.assigned ? s.assigned.length : 0;
    const needed = s.instNeeded;
    let colorClass;
    if (needed === 0) colorClass = 'tl-gray';
    else if (assigned >= needed) colorClass = 'tl-green';
    else if (assigned > 0) colorClass = 'tl-yellow';
    else colorClass = 'tl-red';

    const col = s._col || 0;
    const colWidth = (100 - 2) / totalCols;
    const left = col * colWidth + 1;
    const width = colWidth - 1;

    const teacherNames = s.teachers && s.teachers.length > 0 ? s.teachers.join(', ') : '';
    const assignedNames = s.assigned && s.assigned.length > 0 ? s.assigned.map(n => `<span class="timeline-event-tag">${n}</span>`).join('') : '';

    eventsHtml += `<div class="timeline-event ${colorClass}" style="top:${top}px;height:${height}px;left:${left}%;width:${width}%;"
      onclick="event.stopPropagation();openScheduleFromTimeline(${origIdx}, ${day})">
      <div class="timeline-event-title">${s.start}-${s.end} ${escapeHtml(s.company)}</div>
      <div class="timeline-event-sub">${escapeHtml(s.content || '')}${teacherNames ? ' / 講師: ' + escapeHtml(teacherNames) : ''}${s.participants > 0 ? ' / ' + s.participants + '名' : ''}</div>
      <div class="timeline-event-status">配置: ${assigned}/${needed}</div>
      ${assignedNames ? '<div class="timeline-event-tags">' + assignedNames + '</div>' : ''}
    </div>`;
  });

  // Available instructors (check time-overlap, not just same-date)
  const allTeachersOnDate = new Set();
  daySchedules.forEach(s => {
    (s.teachers || []).forEach(name => allTeachersOnDate.add(name));
  });

  // Check if an instructor is assigned to ALL sessions on this date (fully booked)
  // vs assigned to some but has non-overlapping slots free
  function isFullyBookedOnDate(instName) {
    const assignedSessions = daySchedules.filter(s => (s.assigned || []).includes(instName));
    if (assignedSessions.length === 0) return false;
    // Check if every session on this date either has this person assigned or overlaps with an assigned session
    const unassignedSessions = daySchedules.filter(s => !(s.assigned || []).includes(instName));
    for (const us of unassignedSessions) {
      const hasConflict = assignedSessions.some(as => timesOverlap(us.start, us.end, as.start, as.end));
      if (!hasConflict) return false; // There's a non-overlapping session they could do
    }
    return true;
  }

  let availHtml = '';
  let unavailHtml = '';
  shiftData.instructors.forEach(inst => {
    const avail = inst.availability && inst.availability[dateStr];
    if (avail && avail !== 'NG' && avail !== '未回答') {
      const availColor = isFullDay(avail) ? 'var(--green)' : avail === 'AM' ? 'var(--blue)' : avail === 'PM' ? 'var(--purple)' : 'var(--yellow)';
      const assignedCount = daySchedules.filter(s => (s.assigned || []).includes(inst.name)).length;
      if (allTeachersOnDate.has(inst.name)) {
        unavailHtml += `<div class="avail-list-item"><span class="avail-list-dot" style="background:var(--text3);"></span><span style="color:var(--text3);text-decoration:line-through;">${escapeHtml(inst.name)}</span><span style="color:var(--text3);font-size:11px;">講師</span></div>`;
      } else if (isFullyBookedOnDate(inst.name)) {
        unavailHtml += `<div class="avail-list-item"><span class="avail-list-dot" style="background:var(--text3);"></span><span style="color:var(--text3);text-decoration:line-through;">${escapeHtml(inst.name)}</span><span style="color:var(--text3);font-size:11px;">配置済み</span></div>`;
      } else if (assignedCount > 0) {
        availHtml += `<div class="avail-list-item"><span class="avail-list-dot" style="background:${availColor};"></span><span style="color:var(--text);">${escapeHtml(inst.name)}</span><span style="color:var(--orange);font-size:11px;">${assignedCount}件配置済み・追加可</span></div>`;
      } else {
        availHtml += `<div class="avail-list-item"><span class="avail-list-dot" style="background:${availColor};"></span><span style="color:var(--text);">${escapeHtml(inst.name)}</span><span style="color:${availColor};font-weight:600;">${avail}</span></div>`;
      }
    }
  });
  if (!availHtml) availHtml = '<span style="color:var(--text3);">なし</span>';
  if (unavailHtml) {
    availHtml += `<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border-light);font-size:11px;color:var(--text3);margin-bottom:4px;">配置済み・講師</div>${unavailHtml}`;
  }

  const body = `
    <div class="timeline-wrap" style="height:${totalHours * hourHeight}px;margin-bottom:20px;">
      <div class="timeline">${timelineHtml}</div>
      <div class="timeline-events">${eventsHtml}</div>
    </div>
    <div style="padding-top:12px;border-top:1px solid var(--border-light);">
      <div style="font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px;">参加可能インストラクター</div>
      ${availHtml}
    </div>
    <div style="font-size:11px;color:var(--text3);margin-top:12px;">※ 研修をクリックで詳細・配置編集</div>
  `;
  openShiftModal(`${month}月${day}日(${dow})`, body);
}

// Export to Sheets (Phase 1: スプシ①備考N列)
// ============================================================
const CIRCLE_NUMS = ['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩'];

// shift-data.schedule → スプシ①備考セル値を構築 (日付単位)
function buildSheet1ExportData() {
  const byDate = {};
  (shiftData.schedule || []).forEach(s => {
    if (!byDate[s.date]) byDate[s.date] = [];
    byDate[s.date].push(s);
  });
  Object.values(byDate).forEach(arr => arr.sort((a,b) => (a._col||0) - (b._col||0)));
  const result = [];
  Object.keys(byDate).sort().forEach(date => {
    const sessions = byDate[date];
    const isSingle = sessions.length === 1;
    const lines = sessions.map((s, i) => {
      const prefix = isSingle ? '' : (CIRCLE_NUMS[i] || (i+1) + '.');
      let text;
      if (!s.instNeeded || s.instNeeded === 0) {
        text = 'ー';
      } else if (!s.assigned || s.assigned.length === 0) {
        text = '';  // 未配置
      } else {
        const ic = s.instConfirm || {};
        const names = s.assigned
          .filter(n => ic[n] !== 'NG')
          .map(n => (ic[n] === 'OK') ? n : n + '？');
        text = names.length > 0 ? names.join('+') : 'ー';
      }
      return prefix + text;
    });
    result.push({ date, cellValue: lines.join('\n'), sessionCount: sessions.length });
  });
  return result;
}

// スプシ①から現在のN列値を取得 (範囲: N月!N4:N34)
async function fetchSheet1CurrentBiko(monthNum) {
  const token = await getSheetsAccessToken();
  const range = encodeURIComponent(`${monthNum}月!N4:N34`);
  const resp = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET1_ID}/values/${range}`, {
    headers: { 'Authorization': `Bearer ${token}` },
  });
  if (!resp.ok) throw new Error('スプシ①取得失敗: ' + resp.status + ' ' + await resp.text());
  const j = await resp.json();
  const values = j.values || [];
  const result = {};
  for (let i = 0; i < 31; i++) {
    const day = i + 1;
    result[day] = (values[i] && values[i][0] !== undefined) ? values[i][0] : '';
  }
  return result;
}

// shift-data.schedule を参照して、スプシ②の更新リストを構築
// sheet rows: [日付(0), 曜日(1), 終了flg(2), start(3), end(4), 時間(5), 会社(6), 主担当(7), 内容(8), 確認(9), 場所(10), 参加人数(11), 中田(12), 野沢(13), 樋口(14), 慎也(15), 保坂(16), 赤井(17), ｻﾎﾟ(18)]
function buildSheet2ExportData(sheetRows, targetMonthNum) {
  const schedule = shiftData.schedule || [];
  // 日付(MM/DD) + start + company でキー作成
  const schedMap = {};
  schedule.forEach(s => {
    const [yyyy, mm, dd] = s.date.split('-');
    const mmdd = `${parseInt(mm,10)}/${parseInt(dd,10)}`;  // スプシは "4/15" 等(ゼロ埋めなし)の可能性
    const mmdd2 = `${mm}/${dd}`;                             // "04/15" 形式
    [mmdd, mmdd2].forEach(k => {
      schedMap[`${k}|${s.start}|${s.company}`] = s;
    });
  });
  // セッション単位で差分をまとめる(R/S両方を1エントリに)
  const diffs = [];
  sheetRows.forEach((row, i) => {
    const sheetRowNum = i + 7;
    const date = (row[0] || '').trim();
    const m = date.match(/^(\d{1,2})\/(\d{1,2})/);
    if (!m) return;
    if (parseInt(m[1], 10) !== targetMonthNum) return;
    const start = (row[3] || '').trim();
    const company = (row[6] || '').trim();
    const content = (row[8] || '').trim();
    const key = `${date}|${start}|${company}`;
    const s = schedMap[key];
    const currentR = (row[17] !== undefined ? row[17] : '').toString();
    const currentS = (row[18] !== undefined ? row[18] : '').toString();
    let newR = '', newS = '';
    if (s) {
      const ic = s.instConfirm || {};
      if (s.assigned && s.assigned.includes('赤井')) {
        const st = ic['赤井'];
        if (st === 'OK') newR = '◯';
        else if (st !== 'NG') newR = '◯？';
      }
      if (!s.instNeeded || s.instNeeded === 0) {
        newS = 'ー';
      } else {
        const others = (s.assigned || [])
          .filter(n => n !== '赤井')
          .filter(n => ic[n] !== 'NG');
        if (others.length === 0) newS = '';
        else newS = others.map(n => ic[n] === 'OK' ? n : n + '？').join('+');
      }
    }
    const rChanged = newR !== currentR;
    const sChanged = newS !== currentS;
    if (rChanged || sChanged) {
      diffs.push({
        rowNum: sheetRowNum, dateStr: date, start, company, content,
        rOld: currentR, rNew: newR, rChanged,
        sOld: currentS, sNew: newS, sChanged,
      });
    }
  });
  return diffs;
}

async function writeSheet2(yearSheetName, diffs) {
  const data = [];
  diffs.forEach(d => {
    if (d.rChanged) data.push({ range: `${yearSheetName}!R${d.rowNum}`, values: [[d.rNew]] });
    if (d.sChanged) data.push({ range: `${yearSheetName}!S${d.rowNum}`, values: [[d.sNew]] });
  });
  if (!data.length) return;
  const token = await getSheetsAccessToken();
  const resp = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET2_ID}/values:batchUpdate`, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ valueInputOption: 'USER_ENTERED', data }),
  });
  if (!resp.ok) throw new Error('スプシ②書込失敗: ' + resp.status + ' ' + await resp.text());
  return await resp.json();
}

// ============================================================
// スプシ① batchUpdate (備考列一括書き込み)
// ============================================================
async function writeSheet1Biko(monthNum, rowsToUpdate) {
  // rowsToUpdate: [{day: 7, value: '福田+赤井？'}, ...]
  const token = await getSheetsAccessToken();
  const data = rowsToUpdate.map(r => ({
    range: `${monthNum}月!N${r.day + 3}`,  // 1日=r4, 31日=r34
    values: [[r.value]],
  }));
  const resp = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET1_ID}/values:batchUpdate`, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ valueInputOption: 'USER_ENTERED', data }),
  });
  if (!resp.ok) throw new Error('スプシ①書込失敗: ' + resp.status + ' ' + await resp.text());
  return await resp.json();
}

// モーダル表示
let _exportModalPrevFocus = null;
let _exportKeydownHandler = null;

async function openExportModal() {
  if (!sheetsCreds) {
    showToast('スプシ認証情報なし (encrypted-sheets.json未配布)', 'error');
    return;
  }
  if (!currentMonthKey) {
    showToast('対象月が未選択', 'error');
    return;
  }
  const monthNum = parseInt(currentMonthKey.split('-')[1], 10);
  _exportModalPrevFocus = document.activeElement;

  // 余白確保: width:min(900px, calc(100vw - 160px)) / sticky header-footer
  const wrap = document.createElement('div');
  wrap.id = 'exportModal';
  wrap.setAttribute('role', 'dialog');
  wrap.setAttribute('aria-modal', 'true');
  wrap.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:10001;display:flex;align-items:center;justify-content:center;';
  wrap.addEventListener('click', e => { if (e.target === wrap) closeExportModal(); });
  // 背景スクロール/キーロック
  document.body.classList.add('modal-open');
  wrap.innerHTML = `<div class="export-modal-panel" style="background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:12px;width:min(1100px, calc(100vw - 160px));max-height:calc(100vh - 120px);display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,0.5);overflow:hidden;">
    <div class="export-modal-header" style="position:sticky;top:0;background:var(--card);z-index:5;display:flex;justify-content:space-between;align-items:center;padding:20px 28px 14px;border-bottom:1px solid var(--border-light);">
      <h3 style="margin:0;font-size:16px;">📤 スプシ書き出し (${monthNum}月)</h3>
      <button id="exportCloseBtn" onclick="closeExportModal()" title="閉じる (Esc)" aria-label="閉じる" style="background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;padding:0 4px;line-height:1;">×</button>
    </div>
    <div id="exportModalBody" style="flex:1;overflow:auto;padding:16px 28px;">
      <div style="padding:40px;text-align:center;color:var(--text2);">読込中...</div>
    </div>
    <div class="export-modal-footer" style="position:sticky;bottom:0;background:var(--card);z-index:5;display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 28px;border-top:1px solid var(--border-light);">
      <div style="font-size:11px;color:var(--text3);">Esc 閉じる / Alt+S 書き出し / Tab で項目移動</div>
      <div style="display:flex;gap:8px;">
        <button id="exportCancelBtn" onclick="closeExportModal()" style="padding:8px 16px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:13px;">キャンセル (Esc)</button>
        <button id="exportConfirmBtn" onclick="confirmExport()" disabled style="padding:8px 18px;background:var(--blue);color:#fff;border:none;border-radius:6px;cursor:pointer;opacity:0.45;font-size:13px;font-weight:600;">この内容で書き出す (Alt+S)</button>
      </div>
    </div>
  </div>`;
  document.body.appendChild(wrap);

  // キーハンドラ: Esc閉じる / Alt+S確定 / Tab循環 (focus trap)
  _exportKeydownHandler = (e) => {
    if (e.key === 'Escape') { e.preventDefault(); closeExportModal(); return; }
    if (e.altKey && (e.key === 's' || e.key === 'S')) {
      e.preventDefault();
      const btn = document.getElementById('exportConfirmBtn');
      if (btn && !btn.disabled) btn.click();
      return;
    }
    if (e.key === 'Tab') {
      // フォーカストラップ
      const focusables = wrap.querySelectorAll('button:not([disabled]), [href], [tabindex]:not([tabindex="-1"])');
      if (focusables.length === 0) return;
      const first = focusables[0];
      const last = focusables[focusables.length - 1];
      if (e.shiftKey) {
        if (document.activeElement === first || !wrap.contains(document.activeElement)) {
          e.preventDefault(); last.focus();
        }
      } else {
        if (document.activeElement === last || !wrap.contains(document.activeElement)) {
          e.preventDefault(); first.focus();
        }
      }
    }
  };
  document.addEventListener('keydown', _exportKeydownHandler, true);

  try {
    // スプシ①: 備考列差分
    const current1 = await fetchSheet1CurrentBiko(monthNum);
    const newData1 = buildSheet1ExportData();
    const diffs1 = [];
    newData1.forEach(row => {
      const day = parseInt(row.date.split('-')[2], 10);
      const old = current1[day] || '';
      if (old !== row.cellValue) {
        diffs1.push({ day, dateStr: row.date, old, neu: row.cellValue });
      }
    });
    // スプシ②: ｻﾎﾟ/赤井列差分 (年度判定: 4-12月=同年、1-3月=前年度)
    const year = (monthNum >= 4) ? parseInt(currentMonthKey.split('-')[0], 10)
                                  : parseInt(currentMonthKey.split('-')[0], 10) - 1;
    const yearSheetName = `${year}年`;
    const sheet2Rows = await fetchSheet2Data(yearSheetName);
    const diffs2 = buildSheet2ExportData(sheet2Rows, monthNum);

    window._exportDiffs1 = diffs1;
    window._exportDiffs2 = diffs2;
    window._exportMonthNum = monthNum;
    window._exportYearSheet = yearSheetName;

    const total = diffs1.length + diffs2.length;
    const body = document.getElementById('exportModalBody');
    if (total === 0) {
      body.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text2);font-size:13px;">✓ 差分なし (スプシ①/② ともに最新状態です)</div>';
      setTimeout(() => document.getElementById('exportCancelBtn')?.focus(), 0);
    } else {
      // セクション1: スプシ① 備考列
      let html = `<div style="font-size:12px;color:var(--text2);margin-bottom:14px;">スプシ①/②合わせて <strong style="color:var(--text);">${total}件</strong> の差分があります</div>`;
      html += `<section style="margin-bottom:24px;">
        <h4 style="margin:0 0 8px;font-size:13px;color:var(--text);border-left:3px solid var(--blue);padding-left:8px;">スプシ① 備考列 (${monthNum}月シート) - ${diffs1.length}件</h4>`;
      if (diffs1.length === 0) {
        html += '<div style="color:var(--text3);font-size:12px;padding:8px 12px;">差分なし</div>';
      } else {
        html += '<table style="width:100%;border-collapse:collapse;font-size:12px;"><thead><tr style="background:var(--border-light);"><th style="padding:8px 10px;text-align:left;white-space:nowrap;">日</th><th style="padding:8px 10px;text-align:left;width:45%;">Before</th><th style="padding:8px 10px;text-align:left;width:45%;">After</th></tr></thead><tbody>';
        diffs1.forEach(d => {
          const oldHtml = (d.old || '').replace(/</g,'&lt;').replace(/\n/g,'<br>') || '<span style="color:var(--text3);">(空欄)</span>';
          const newHtml = (d.neu || '').replace(/</g,'&lt;').replace(/\n/g,'<br>') || '<span style="color:var(--text3);">(空欄)</span>';
          html += `<tr style="border-bottom:1px solid var(--border-light);"><td style="padding:8px 10px;font-weight:600;vertical-align:top;white-space:nowrap;">${d.day}日</td><td style="padding:8px 10px;color:var(--text2);vertical-align:top;">${oldHtml}</td><td style="padding:8px 10px;color:var(--green);vertical-align:top;">${newHtml}</td></tr>`;
        });
        html += '</tbody></table>';
      }
      html += '</section>';

      // セクション2: スプシ② ｻﾎﾟ/赤井列 (1セッション=1行、R/S並列表示)
      html += `<section>
        <h4 style="margin:0 0 8px;font-size:13px;color:var(--text);border-left:3px solid var(--purple);padding-left:8px;">スプシ② ｻﾎﾟ列(S)/赤井列(R) (${yearSheetName}シート) - ${diffs2.length}件</h4>`;
      if (diffs2.length === 0) {
        html += '<div style="color:var(--text3);font-size:12px;padding:8px 12px;">差分なし</div>';
      } else {
        html += `<table style="width:100%;border-collapse:collapse;font-size:12px;">
          <thead>
            <tr style="background:var(--border-light);">
              <th rowspan="2" style="padding:8px 10px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--border);">日/時間</th>
              <th rowspan="2" style="padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);">会社 / 内容</th>
              <th colspan="2" style="padding:6px 10px;text-align:center;border-left:1px solid var(--border);color:var(--red);">赤井列(R)</th>
              <th colspan="2" style="padding:6px 10px;text-align:center;border-left:1px solid var(--border);">ｻﾎﾟ列(S)</th>
            </tr>
            <tr style="background:var(--border-light);">
              <th style="padding:4px 8px;text-align:left;font-weight:400;color:var(--text3);font-size:11px;border-left:1px solid var(--border);border-bottom:1px solid var(--border);">Before</th>
              <th style="padding:4px 8px;text-align:left;font-weight:400;color:var(--text3);font-size:11px;border-bottom:1px solid var(--border);">After</th>
              <th style="padding:4px 8px;text-align:left;font-weight:400;color:var(--text3);font-size:11px;border-left:1px solid var(--border);border-bottom:1px solid var(--border);">Before</th>
              <th style="padding:4px 8px;text-align:left;font-weight:400;color:var(--text3);font-size:11px;border-bottom:1px solid var(--border);">After</th>
            </tr>
          </thead>
          <tbody>`;
        const cell = (val, changed, after, borderLeft) => {
          const v = (val || '').toString().replace(/</g,'&lt;');
          const inner = v || '<span style="color:var(--text3);">(空欄)</span>';
          const bl = borderLeft ? 'border-left:1px solid var(--border);' : '';
          if (!changed) {
            return `<td style="${bl}padding:8px;color:var(--text3);vertical-align:top;font-size:11px;">${inner}</td>`;
          }
          const color = after ? 'var(--green)' : 'var(--text2)';
          const weight = after ? '600' : '400';
          return `<td style="${bl}padding:8px;color:${color};font-weight:${weight};vertical-align:top;">${inner}</td>`;
        };
        diffs2.forEach(d => {
          html += `<tr style="border-bottom:1px solid var(--border-light);">
            <td style="padding:8px 10px;font-weight:600;vertical-align:top;white-space:nowrap;">${d.dateStr}<br><span style="font-weight:400;color:var(--text3);">${d.start || ''}</span></td>
            <td style="padding:8px 10px;color:var(--text2);vertical-align:top;">${(d.company||'').replace(/</g,'&lt;')}<br><span style="font-size:11px;color:var(--text3);">${(d.content||'').slice(0,40).replace(/</g,'&lt;')}</span></td>
            ${cell(d.rOld, d.rChanged, false, true)}
            ${cell(d.rNew, d.rChanged, true, false)}
            ${cell(d.sOld, d.sChanged, false, true)}
            ${cell(d.sNew, d.sChanged, true, false)}
          </tr>`;
        });
        html += '</tbody></table>';
      }
      html += '</section>';

      body.innerHTML = html;
      const btn = document.getElementById('exportConfirmBtn');
      btn.disabled = false;
      btn.style.opacity = '1';
      setTimeout(() => btn.focus(), 0);
    }
  } catch (e) {
    document.getElementById('exportModalBody').innerHTML = `<div style="padding:20px;color:var(--red);font-size:13px;">エラー: ${e.message}</div>`;
    setTimeout(() => document.getElementById('exportCancelBtn')?.focus(), 0);
  }
}

function closeExportModal() {
  const m = document.getElementById('exportModal');
  if (m) m.remove();
  window._exportDiffs1 = null;
  window._exportDiffs2 = null;
  if (_exportKeydownHandler) {
    document.removeEventListener('keydown', _exportKeydownHandler, true);
    _exportKeydownHandler = null;
  }
  updateModalOpenState();
  if (_exportModalPrevFocus && typeof _exportModalPrevFocus.focus === 'function') {
    try { _exportModalPrevFocus.focus(); } catch(e) {}
  }
  _exportModalPrevFocus = null;
}

async function confirmExport() {
  const diffs1 = window._exportDiffs1 || [];
  const diffs2 = window._exportDiffs2 || [];
  const monthNum = window._exportMonthNum;
  const yearSheetName = window._exportYearSheet;
  if (!diffs1.length && !diffs2.length) { closeExportModal(); return; }
  const btn = document.getElementById('exportConfirmBtn');
  btn.disabled = true;
  btn.textContent = '書き込み中...';
  try {
    // スプシ① 備考列
    if (diffs1.length) {
      const rows = diffs1.map(d => ({ day: d.day, value: d.neu }));
      await writeSheet1Biko(monthNum, rows);
    }
    // スプシ② ｻﾎﾟ/赤井列
    if (diffs2.length) {
      await writeSheet2(yearSheetName, diffs2);
    }
    closeExportModal();
    const msg = `✓ スプシ更新完了 (①備考:${diffs1.length}件 / ②ｻﾎﾟ赤井:${diffs2.length}件)`;
    showToast(msg, 'success');
  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'この内容で書き出す (Alt+S)';
    showToast('書込エラー: ' + e.message, 'error');
  }
}

      });
      html += '</table>';

    body.innerHTML = html;
    modal.style.display = 'flex';
    document.body.classList.add('modal-open');

  function hideHelp() {

    else document.body.classList.remove('modal-open');

  window.openShortcutHelpFromNav = showHelp;  // サイドナビボタンから呼び出し用
  document.addEventListener('keydown', e => {
    if (['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName)) return;
    if (e.key === '?') { e.preventDefault(); if (modal.style.display === 'flex') hideHelp(); else showHelp(); }
    else if (e.key === 'Escape' && modal.style.display === 'flex') { hideHelp(); }
