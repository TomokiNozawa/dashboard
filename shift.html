<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シフト管理 | NozaBoard</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1117; --card: #161b22; --card-hover: #1c2129;
  --border: #30363d; --border-light: #21262d;
  --text: #e6edf3; --text2: #8b949e; --text3: #6e7681;
  --blue: #58a6ff; --green: #3fb950; --yellow: #d29922; --red: #f85149; --purple: #bc8cff; --orange: #f0883e;
  --radius: 8px;
}
.light {
  --bg: #f5f6f8; --card: #ffffff; --card-hover: #f0f2f5;
  --border: #d8dde4; --border-light: #e8ecf0;
  --text: #1a1d23; --text2: #5a6270; --text3: #8b95a5;
}
/* theme-toggle は side-nav 内に統合 (side-nav-item と同じスタイル継承) */
.theme-toggle { display: none; }

/* Scrollbar */
* { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }
body.modal-open { overflow: hidden; }  /* モーダル表示中は背景スクロール禁止 */

/* Login */
.login-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg);
  display: flex; justify-content: center; align-items: center;
}
.login-container {
  text-align: center; padding: 48px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  max-width: 400px; width: 90%;
}
.login-container h1 {
  font-size: 20px; font-weight: 700; margin-bottom: 8px;
  background: linear-gradient(135deg, #e6edf3, #58a6ff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.login-container p { font-size: 13px; color: var(--text2); margin-bottom: 24px; }
.login-input {
  width: 100%; padding: 12px 16px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 14px;
  outline: none; transition: border-color 0.2s;
}
.login-input:focus { border-color: var(--blue); }
.login-btn {
  width: 100%; padding: 12px; margin-top: 16px;
  background: linear-gradient(135deg, #238636, #3fb950);
  border: none; border-radius: 8px; color: white;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
}
.login-btn:hover { opacity: 0.9; }
.login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.login-error { color: var(--red); font-size: 13px; margin-top: 12px; display: none; }
.login-loading { color: var(--text2); font-size: 13px; margin-top: 12px; display: none; }

/* ── Side Nav ── */
.side-nav {
  position: fixed; top: 0; left: 0; width: 56px; height: 100vh;
  background: var(--card); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 8px 0; z-index: 200; overflow: hidden;
  transition: width 0.2s ease;
}
.side-nav:hover { width: 140px; }
.side-nav-item {
  display: flex; align-items: center; gap: 8px; width: 100%;
  padding: 10px 16px; color: var(--text3); text-decoration: none;
  font-size: 11px; font-weight: 600; white-space: nowrap; overflow: hidden;
  border-radius: 0; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
.side-nav-item:hover { background: var(--card-hover); color: var(--text); }
.side-nav-item span:first-child, .side-nav-item svg {
  display: flex; align-items: center; justify-content: center;
  width: 22px; height: 22px; flex-shrink: 0;
}
.side-nav-item.active { color: var(--blue); background: rgba(88,166,255,0.08); border-right: 2px solid var(--blue); }
.side-nav-item span:last-child { opacity: 0; transition: opacity 0.15s; }
.side-nav:hover .side-nav-item span:last-child { opacity: 1; }
button.side-nav-item {
  background: none; border: none; font-family: inherit; font-size: 11px; font-weight: 600;
  text-align: left; cursor: pointer; color: var(--text3);
}
.side-nav-bottom { margin-top: auto; border-top: 1px solid var(--border-light); width: 100%; padding-top: 4px; }

/* Main App */
.container { max-width: 1500px; margin: 0 auto; padding: 24px 20px 100px; padding-left: 76px; }
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Header */
.page-header { display: flex; align-items: center; gap: 16px; margin-bottom: 32px; padding-bottom: 16px; border-bottom: 1px solid var(--border-light); flex-wrap: wrap; }
.page-header h1 { font-size: 22px; font-weight: 700; }
.page-header .header-right { margin-left: auto; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.page-header .header-right .action-bar { margin-top: 4px; }
.page-header .sub { font-size: 12px; color: var(--text3); white-space: nowrap; }

/* Tabs */
.tabs { display: flex; gap: 4px; margin-bottom: 24px; border-bottom: 1px solid var(--border-light); overflow-x: auto; }
.tab {
  padding: 10px 18px; font-size: 13px; font-weight: 500;
  color: var(--text2); background: none; border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer; white-space: nowrap; transition: all 0.2s;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--blue); border-bottom-color: var(--blue); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Summary Cards */
.summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 32px; }
.summary-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; text-align: center; }
.summary-val { font-size: 28px; font-weight: 700; }
.summary-label { font-size: 12px; color: var(--text3); margin-top: 4px; }

/* Section */
.section { margin-top: 28px; }
.section h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; gap: 8px; }

/* Tables */
.table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border-light); }
table.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th, .data-table td { padding: 10px 12px; border-bottom: 1px solid var(--border-light); text-align: center; }
.data-table th { background: var(--card); color: var(--text2); font-weight: 600; position: sticky; top: 0; z-index: 2; white-space: nowrap; }
.data-table td { background: var(--bg); }
.data-table tbody tr:hover td { background: var(--card); }
.data-table .text-left { text-align: left; }
.data-table .text-right { text-align: right; }
.data-table tfoot td { background: var(--card); font-weight: 600; }

.row-muted td { opacity: 0.45; }

.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.badge-a { background: rgba(248,81,73,0.15); color: var(--red); }
.badge-b { background: rgba(210,153,34,0.15); color: var(--yellow); }
.badge-none { background: rgba(110,118,129,0.15); color: var(--text3); }

.deficit { color: var(--red); font-weight: 700; }
.surplus { color: var(--green); font-weight: 600; }
.balanced { color: var(--text3); }

/* Availability Matrix */
.avail-table th, .avail-table td { padding: 8px 6px; min-width: 56px; }
.avail-table th.date-header { font-size: 11px; padding: 10px 4px; white-space: nowrap; }
.avail-cell {
  min-width: 48px; padding: 0 6px; height: 36px; border-radius: 6px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; user-select: none; transition: all 0.15s;
  margin: 0 auto; white-space: nowrap;
}
.avail-cell:hover { transform: scale(1.15); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
.avail-full { background: rgba(63,185,80,0.25); color: var(--green); }
.avail-full-ok { background: rgba(63,185,80,0.25); color: var(--green); }
.avail-full-ng { background: rgba(63,185,80,0.12); color: var(--green); outline: 1px dashed rgba(210,153,34,0.7); outline-offset: -2px; }
.avail-am { background: rgba(88,166,255,0.25); color: var(--blue); }
.avail-pm { background: rgba(188,140,255,0.25); color: var(--purple); }
.avail-hold { background: rgba(210,153,34,0.25); color: var(--yellow); }
.avail-ng { background: rgba(248,81,73,0.25); color: var(--red); }
.avail-pending { background: rgba(139,148,158,0.18); color: var(--text2); border: 1px dashed rgba(139,148,158,0.5); }
.avail-empty { background: rgba(110,118,129,0.08); color: var(--text3); }
.avail-name-cell { text-align: left !important; white-space: nowrap; font-weight: 500; font-size: 13px; position: sticky; left: 0; z-index: 1; padding: 10px 14px !important; min-width: 120px; }
.avail-group-header { background: var(--border-light) !important; }
.avail-group-header td { font-size: 12px; font-weight: 600; color: var(--text2); padding: 6px 14px !important; letter-spacing: 0.05em; }
.avail-table tbody tr:nth-child(even) td:not(.avail-name-cell) { background: rgba(255,255,255,0.015); }
.avail-table tbody tr:hover td { background: rgba(88,166,255,0.06) !important; }
.avail-table tbody tr:hover .avail-name-cell { background: rgba(88,166,255,0.1) !important; }

/* Contact table */
.contact-check { width: 18px; height: 18px; cursor: pointer; accent-color: var(--green); }
.editable-note {
  background: transparent; border: 1px solid transparent; border-radius: 4px;
  color: var(--text2); font-size: 12px; padding: 4px 8px; width: 100%; min-width: 120px;
  outline: none; font-family: inherit;
}
.editable-note:hover { border-color: var(--border); }
.editable-note:focus { border-color: var(--blue); background: var(--bg); color: var(--text); }

/* Calendar - Sunday start with narrow weekends */
.calendar-grid { display: grid; grid-template-columns: 0.3fr 1fr 1fr 1fr 1fr 1fr 0.3fr; gap: 4px; }
.calendar-header { text-align: center; font-size: 12px; font-weight: 600; color: var(--text2); padding: 8px 4px; }
.calendar-header-sun { color: var(--red); }
.calendar-header-sat { color: var(--blue); }
.calendar-cell {
  background: var(--card); border: 1px solid var(--border-light); border-radius: var(--radius);
  padding: 6px; min-height: 100px; font-size: 11px; position: relative; transition: all 0.2s; overflow-y: auto;
}
.calendar-cell:hover { border-color: var(--border); }
.calendar-cell.empty { background: transparent; border-color: transparent; }
.calendar-day { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.calendar-event { padding: 2px 4px; border-radius: 3px; margin-bottom: 2px; font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.4; }
.cal-green { background: rgba(63,185,80,0.15); color: var(--green); }
.cal-yellow { background: rgba(210,153,34,0.15); color: var(--yellow); }
.cal-red { background: rgba(248,81,73,0.15); color: var(--red); }
.cal-gray { background: rgba(110,118,129,0.1); color: var(--text3); }
.calendar-month-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.calendar-month-nav button { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text2); padding: 6px 12px; cursor: pointer; font-size: 13px; }
.calendar-month-nav button:hover { background: var(--card-hover); color: var(--text); }
.calendar-month-nav span { font-size: 16px; font-weight: 600; }

/* Timeline view (Google Calendar style) */
.timeline-wrap { position: relative; margin-left: 50px; }
.timeline { position: relative; border-left: 1px solid var(--border-light); }
.timeline-hour { position: relative; height: 60px; border-bottom: 1px solid var(--border-light); }
.timeline-hour-label { position: absolute; left: -50px; top: -8px; font-size: 11px; color: var(--text3); width: 44px; text-align: right; }
.timeline-events { position: absolute; top: 0; left: 4px; right: 0; bottom: 0; }
.timeline-event {
  position: absolute; border-radius: 6px; padding: 6px 10px;
  font-size: 11px; overflow-y: auto; cursor: pointer;
  border-left: 3px solid; z-index: 1; transition: opacity 0.15s;
  min-height: 28px;
}
.timeline-event:hover { opacity: 0.85; }
.timeline-event-title { font-weight: 600; font-size: 12px; }
.timeline-event-sub { font-size: 10px; opacity: 0.8; }
.timeline-event-status { font-size: 10px; font-weight: 600; margin-top: 2px; }
.timeline-event-tags { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px; }
.timeline-event-tag { background: rgba(255,255,255,0.15); padding: 1px 6px; border-radius: 3px; font-size: 9px; font-weight: 500; }
.tl-green { background: rgba(63,185,80,0.15); border-color: var(--green); color: var(--green); }
.tl-yellow { background: rgba(210,153,34,0.15); border-color: var(--yellow); color: var(--yellow); }
.tl-red { background: rgba(248,81,73,0.15); border-color: var(--red); color: var(--red); }
.tl-gray { background: rgba(110,118,129,0.1); border-color: var(--text3); color: var(--text3); }

/* Suggestion - Split Layout */
.suggest-split { display: flex; gap: 16px; }
.suggest-left { flex: 0 0 55%; max-height: calc(100vh - 200px); overflow: auto; }
.suggest-right { flex: 1; max-height: calc(100vh - 200px); overflow: auto; }
@media (max-width: 1024px) {
  .suggest-split { flex-direction: column; }
  .suggest-left, .suggest-right { flex: none; max-height: none; }
}
.suggest-status-bar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
.suggest-stat { padding: 6px 14px; border-radius: var(--radius); font-size: 13px; font-weight: 600; }
.suggest-stat.ok { background: rgba(63,185,80,0.15); color: var(--green); }
.suggest-stat.warn { background: rgba(240,136,62,0.15); color: var(--orange); }
.suggest-stat.ng { background: rgba(248,81,73,0.15); color: var(--red); }
.suggest-mini-matrix { border-collapse: collapse; font-size: 11px; width: 100%; }
.suggest-mini-matrix th, .suggest-mini-matrix td { padding: 3px 6px; text-align: center; border: 1px solid var(--border); white-space: nowrap; }
.suggest-mini-matrix th { background: var(--card); position: sticky; top: 0; z-index: 2; font-size: 10px; }
.suggest-mini-matrix .avail-name-cell { text-align: left; position: sticky; left: 0; background: var(--bg); z-index: 1; min-width: 60px; font-weight: 500; }
.suggest-mini-matrix .assigned-mark { background: rgba(88,166,255,0.25); color: var(--blue); font-weight: 700; }
.suggest-mini-matrix .teacher-mark { background: rgba(188,140,255,0.25); color: var(--purple); font-weight: 700; }
.suggestion-list { display: flex; flex-direction: column; gap: 8px; }
.suggestion-item {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.suggestion-info { flex: 1; }
.suggestion-date { font-weight: 600; font-size: 14px; }
.suggestion-detail { font-size: 12px; color: var(--text2); margin-top: 2px; }
.suggestion-names { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.suggestion-name { background: rgba(88,166,255,0.12); color: var(--blue); padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
.suggestion-current { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
.suggestion-current-name { background: rgba(139,148,165,0.15); color: var(--text2); padding: 2px 8px; border-radius: 4px; font-size: 11px; }
.suggestion-teacher-name { background: rgba(188,140,255,0.15); color: var(--purple); padding: 2px 8px; border-radius: 4px; font-size: 11px; }
.apply-btn { padding: 6px 14px; background: var(--green); color: #fff; border: none; border-radius: var(--radius); font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.apply-btn:hover { opacity: 0.85; }
.generate-btn { padding: 10px 20px; background: linear-gradient(135deg, #1f6feb, #58a6ff); color: #fff; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 12px; }
.generate-btn:hover { opacity: 0.9; }

/* History */
.history-list { display: flex; flex-direction: column; gap: 8px; }
.history-item { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; }
.history-date { font-size: 13px; font-weight: 600; }
.history-msg { font-size: 12px; color: var(--text2); margin-top: 2px; }
.history-author { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* Save Button */
.save-fab {
  position: fixed; bottom: 24px; right: 24px; z-index: 100;
  display: flex; align-items: center; gap: 8px;
  padding: 14px 24px;
  background: linear-gradient(135deg, #238636, #3fb950);
  border: none; border-radius: 12px;
  color: white; font-size: 14px; font-weight: 600;
  cursor: pointer; box-shadow: 0 4px 20px rgba(63,185,80,0.3);
  transition: all 0.2s;
}
.save-fab:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(63,185,80,0.4); }
.save-fab:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.save-badge {
  background: rgba(255,255,255,0.25); padding: 2px 8px; border-radius: 10px;
  font-size: 11px;
}

/* Action buttons bar */
.action-bar {
  display: flex; gap: 10px; align-items: center; margin-left: auto;
}
.reload-fab {
  display: flex; align-items: center; gap: 6px;
  padding: 12px 18px;
  background: linear-gradient(135deg, #1f6feb, #58a6ff);
  border: none; border-radius: 12px;
  color: white; font-size: 13px; font-weight: 600;
  cursor: pointer; box-shadow: 0 4px 16px rgba(88,166,255,0.3);
  transition: all 0.2s;
}
.reload-fab:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(88,166,255,0.4); }
.reload-fab:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* Toast */
.toast {
  position: fixed; top: 70px; right: 24px; z-index: 200;
  padding: 12px 20px; border-radius: var(--radius);
  font-size: 13px; font-weight: 500;
  transform: translateX(120%); transition: transform 0.3s ease;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
}
.toast.show { transform: translateX(0); }
.toast-success { background: #238636; color: white; }
.toast-error { background: var(--red); color: white; }

/* Legend */
.legend { display: flex; gap: 16px; margin-bottom: 12px; font-size: 12px; color: var(--text2); flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 6px; }

/* Loading screen */
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes loadPulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
@keyframes loadSlide { 0% { transform: translateX(-100%); } 100% { transform: translateX(400%); } }
@keyframes loadFadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.7s linear infinite; }

.load-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 70vh; gap: 24px;
  animation: loadFadeIn 0.5s ease;
}
.load-logo {
  font-size: 32px; font-weight: 700; letter-spacing: -0.02em;
  background: linear-gradient(135deg, var(--text), var(--blue));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.load-sub { font-size: 13px; color: var(--text3); letter-spacing: 0.05em; }
.load-bar-wrap {
  width: 200px; height: 3px; background: var(--border-light); border-radius: 2px;
  overflow: hidden; position: relative;
}
.load-bar-fill {
  position: absolute; top: 0; left: 0; width: 50%; height: 100%;
  background: linear-gradient(90deg, transparent, var(--blue), transparent);
  border-radius: 2px; animation: loadSlide 1.2s ease-in-out infinite;
}
.load-status {
  font-size: 12px; color: var(--text3); animation: loadPulse 1.5s ease infinite;
}
.load-dots { display: flex; gap: 6px; margin-top: 4px; }
.load-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--blue);
  animation: loadPulse 1.2s ease infinite;
}
.load-dot:nth-child(2) { animation-delay: 0.2s; }
.load-dot:nth-child(3) { animation-delay: 0.4s; }

/* Sortable column headers */
.data-table th.sortable { cursor: pointer; user-select: none; }
.data-table th.sortable:hover { color: var(--blue); }
.sort-arrow { font-size: 10px; margin-left: 3px; }

/* Editable instNeeded */
.editable-inst-needed {
  background: transparent; border: 1px solid transparent; border-radius: 4px;
  color: var(--text); font-size: 13px; padding: 2px 6px; width: 50px;
  text-align: center; outline: none; font-family: inherit;
}
.editable-inst-needed:hover { border-color: var(--border); }
.editable-inst-needed:focus { border-color: var(--blue); background: var(--bg); }

/* Assignment UI */
.assign-tags { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
.assign-tag {
  display: inline-flex; align-items: center; gap: 3px;
  background: rgba(88,166,255,0.12); color: var(--blue);
  padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500;
}
.assign-tag .remove-tag {

<script>
// ============================================================
// State
// ============================================================
let shiftData = null;
let currentMonthKey = null;
let fileSha = null;
let pat = null;
let changeCount = 0;
let sheetsCreds = null; // Google Sheets OAuth (refresh_token等)、encrypted-sheets.json 経由で取得
let sheetsAccessToken = null;

// スプシID (スキル シフト月次調整 SKILL.md と同じ)
const SHEET1_ID = '1IqclCXG661Ssx8OZkjEmDiriiN36CEtB3uHNTc_bnWU'; // インストラクター管理表
const SHEET2_ID = '1ZAyQWtU1N5rByZuSAGvZs8t6kwWL2g0de1__5b6yark'; // toB管理表

function applyMonthAlias(key) {
  if (!shiftData || !shiftData.months || !shiftData.months[key]) return;
  currentMonthKey = key;
  shiftData.schedule = shiftData.months[key].schedule;
  shiftData.instructors = shiftData.months[key].instructors;
}

function syncAliasToMonths() {
  if (currentMonthKey && shiftData && shiftData.months && shiftData.months[currentMonthKey]) {
    shiftData.months[currentMonthKey].schedule = shiftData.schedule;
    shiftData.months[currentMonthKey].instructors = shiftData.instructors;
  }
}

function switchMonth(key) {
  if (key === currentMonthKey) return;
  syncAliasToMonths();
  applyMonthAlias(key);
  if (shiftData.currentMonth !== key) {
    shiftData.currentMonth = key;
    changeCount++;
    updateSaveBadge();
  }
  renderApp();
}
const SESSION_TIMEOUT = 30 * 24 * 60 * 60 * 1000; // 30 days
const API_BASE = 'https://api.github.com';
const REPO = 'TomokiNozawa/dashboard-data';
const FILE_PATH = 'shift-data.json';

// Sort state for schedule table
let scheduleSortState = { column: 'date', direction: 'asc' };
let scheduleFilterFuture = false;
let scheduleFilterDeficit = false;
let scheduleFilterTeacher = '';

function getTodayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ============================================================
// Authentication
// ============================================================
async function init() {
  let storedPass = localStorage.getItem('dk_pass');
  let storedTs = localStorage.getItem('dk_ts');
  // Migrate from sessionStorage
  if (!storedPass && sessionStorage.getItem('dk_pass')) {
    storedPass = sessionStorage.getItem('dk_pass');
    storedTs = sessionStorage.getItem('dk_ts');
    localStorage.setItem('dk_pass', storedPass);
    localStorage.setItem('dk_ts', storedTs);
    sessionStorage.removeItem('dk_pass');
    sessionStorage.removeItem('dk_ts');
  }

  if (storedPass && storedTs) {
    const elapsed = Date.now() - parseInt(storedTs, 10);
    if (elapsed < SESSION_TIMEOUT) {
      try {
        pat = await decryptPAT(storedPass);
        try { sheetsCreds = JSON.parse(await decryptFile(storedPass, 'encrypted-sheets.json')); } catch(e) { console.warn('Sheets creds not available:', e); }
        localStorage.setItem('dk_ts', Date.now().toString());
        showApp();
        return;
      } catch (e) {
        localStorage.removeItem('dk_pass');
        localStorage.removeItem('dk_ts');
      }
    } else {
      localStorage.removeItem('dk_pass');
      localStorage.removeItem('dk_ts');
    }
  }
  showLogin();
}

function showLogin() {
  document.getElementById('loginOverlay').style.display = 'flex';
  document.getElementById('app').style.display = 'none';

  const pwInput = document.getElementById('loginPassword');
  const loginBtn = document.getElementById('loginBtn');
  pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  loginBtn.addEventListener('click', doLogin);
  setTimeout(() => pwInput.focus(), 100);
}

async function doLogin() {
  const password = document.getElementById('loginPassword').value;
  if (!password) return;

  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('loginError');
  const loadEl = document.getElementById('loginLoading');
  btn.disabled = true;
  errEl.style.display = 'none';
  loadEl.style.display = 'block';

  try {
    pat = await decryptPAT(password);
    try { sheetsCreds = JSON.parse(await decryptFile(password, 'encrypted-sheets.json')); } catch(e) { console.warn('Sheets creds not available:', e); }
    localStorage.setItem('dk_pass', password);
    localStorage.setItem('dk_ts', Date.now().toString());
    showApp();
  } catch (e) {
    errEl.style.display = 'block';
    loadEl.style.display = 'none';
    btn.disabled = false;
    document.getElementById('loginPassword').select();
  }
}

async function decryptPAT(password) {
  const resp = await fetch('encrypted-pat.json');
  const payload = await resp.json();

  const salt = Uint8Array.from(atob(payload.salt), c => c.charCodeAt(0));
  const iv = Uint8Array.from(atob(payload.iv), c => c.charCodeAt(0));
  const encData = Uint8Array.from(atob(payload.data), c => c.charCodeAt(0));

  const keyMaterial = await crypto.subtle.importKey(
    'raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']
  );
  const key = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-CBC', length: 256 },
    false,
    ['decrypt']
  );

  const decrypted = await crypto.subtle.decrypt(
    { name: 'AES-CBC', iv },
    key,
    encData
  );

  const decoded = new TextDecoder().decode(decrypted);
  const token = decoded.replace(/[\x00-\x1f]/g, '').trim();
  if (!token || token.length < 10) throw new Error('Invalid');
  return token;
}

// 汎用復号: 暗号化ファイルを復号してプレーンテキストを返す
async function decryptFile(password, filename) {
  const resp = await fetch(filename);
  const payload = await resp.json();
  const salt = Uint8Array.from(atob(payload.salt), c => c.charCodeAt(0));
  const iv = Uint8Array.from(atob(payload.iv), c => c.charCodeAt(0));
  const encData = Uint8Array.from(atob(payload.data), c => c.charCodeAt(0));
  const keyMaterial = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
    keyMaterial, { name: 'AES-CBC', length: 256 }, false, ['decrypt']);
  const decrypted = await crypto.subtle.decrypt({ name: 'AES-CBC', iv }, key, encData);
  return new TextDecoder().decode(decrypted).replace(/\0+$/, '');
}

// Sheets access_token 取得(refresh_tokenでリフレッシュ)
async function getSheetsAccessToken() {
  if (sheetsAccessToken && sheetsAccessToken.expires_at > Date.now() + 60000) return sheetsAccessToken.token;
  if (!sheetsCreds) throw new Error('Sheets認証情報なし (encrypted-sheets.json未読込)');
  const body = new URLSearchParams({
    client_id: sheetsCreds.client_id,
    client_secret: sheetsCreds.client_secret,
    refresh_token: sheetsCreds.refresh_token,
    grant_type: 'refresh_token',
  });
  const resp = await fetch(sheetsCreds.token_uri || 'https://oauth2.googleapis.com/token', {
    method: 'POST', headers: {'Content-Type': 'application/x-www-form-urlencoded'}, body,
  });
  if (!resp.ok) throw new Error('Sheets token refresh失敗: ' + resp.status);
  const j = await resp.json();
  sheetsAccessToken = { token: j.access_token, expires_at: Date.now() + (j.expires_in || 3600) * 1000 };
  return j.access_token;
}

// ============================================================
// App Init
// ============================================================
async function showApp() {
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('loadingScreen').style.display = 'flex';

  try {
    await loadData();
    renderApp();
    document.getElementById('loadingScreen').style.display = 'none';
    updateSaveBadge();
  } catch (e) {
    document.getElementById('loadingScreen').innerHTML =
      `<p style="color:var(--red);">データの読み込みに失敗しました: ${e.message}</p>
       <button class="back-btn" onclick="location.reload()" style="margin-top:12px;">再試行</button>`;
  }
}

// ============================================================
// GitHub API
// ============================================================
function apiHeaders() {
  return {
    'Authorization': `token ${pat}`,
    'Accept': 'application/vnd.github.v3+json'
  };
}

async function loadData() {
  const url = `${API_BASE}/repos/${REPO}/contents/${FILE_PATH}?t=${Date.now()}`;
  const resp = await fetch(url, { headers: apiHeaders(), cache: 'no-store' });
  if (!resp.ok) throw new Error(`API error ${resp.status}`);
  const json = await resp.json();
  fileSha = json.sha;
  const binary = atob(json.content.replace(/\n/g, ''));
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  const decoded = new TextDecoder('utf-8').decode(bytes);
  shiftData = JSON.parse(decoded);
  if (shiftData.months) {
    const key = shiftData.currentMonth || Object.keys(shiftData.months).sort().reverse()[0];
    applyMonthAlias(key);
  }
}

async function saveData() {
  const fab = document.getElementById('saveFab');
  fab.disabled = true;
  fab.textContent = '保存中...';

  try {
    syncAliasToMonths();
    const cleaned = JSON.parse(JSON.stringify(shiftData));
    delete cleaned.schedule;
    delete cleaned.instructors;
    const jsonStr = JSON.stringify(cleaned, null, 2);
    const utf8Bytes = new TextEncoder().encode(jsonStr);
    let binaryStr = '';
    utf8Bytes.forEach(b => binaryStr += String.fromCharCode(b));
    const content = btoa(binaryStr);
    const url = `${API_BASE}/repos/${REPO}/contents/${FILE_PATH}`;
    const resp = await fetch(url, {
      method: 'PUT',
      headers: apiHeaders(),
      body: JSON.stringify({
        message: 'シフトデータ更新（ブラウザ編集）',
        content: content,
        sha: fileSha
      })
    });

    if (resp.status === 409) {
      showToast('他のユーザーが更新しています。再読み込みしてください。', 'error');
      fab.disabled = false;
      fab.innerHTML = '保存 <span class="save-badge" id="saveBadge">' + changeCount + '</span>';
      return;
    }
    if (!resp.ok) throw new Error(`Save failed: ${resp.status}`);

    const result = await resp.json();
    fileSha = result.content.sha;
    changeCount = 0;
    updateSaveBadge();
    showToast('保存しました', 'success');
    if (historyLoaded) loadHistory();
  } catch (e) {
    showToast('保存に失敗しました: ' + e.message, 'error');
  }

  fab.disabled = false;
  fab.innerHTML = '💾 保存 <span class="save-badge" id="saveBadge">' + changeCount + '</span>';
}

async function loadHistory() {
  try {
    const url = `${API_BASE}/repos/${REPO}/commits?path=${FILE_PATH}&per_page=10`;
    const resp = await fetch(url, { headers: apiHeaders() });
    if (!resp.ok) return;
    const commits = await resp.json();
    renderHistory(commits);
  } catch (e) { /* ignore */ }
}

// ============================================================
// Reload Data (re-fetch from GitHub)
// ============================================================
async function reloadData() {
  if (changeCount > 0) {
    if (!confirm(`未保存の変更が${changeCount}件あります。破棄してデータを再読み込みしますか？`)) return;
  }
  try {
    showToast('データを再読み込み中...', 'success');
    await loadData();
    changeCount = 0;
    renderApp();
    updateSaveBadge();
    if (historyLoaded) loadHistory();
    showToast('最新データを反映しました', 'success');
  } catch (e) {
    showToast('再読み込みに失敗: ' + e.message, 'error');
  }
}

// ============================================================
// Change Tracking
// ============================================================
function markChanged() {
  changeCount++;
  updateSaveBadge();
  const now = new Date();
  const jst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
  shiftData.lastEditedInBrowser = jst.toISOString().slice(0, 19).replace('T', ' ');
}

function updateSaveBadge() {
  const badge = document.getElementById('saveBadge');
  if (badge) badge.textContent = changeCount;
  const fab = document.getElementById('saveFab');
  if (fab) fab.style.opacity = changeCount > 0 ? '1' : '0.6';
}

// ============================================================
// Toast
// ============================================================
function showToast(msg, type) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast toast-' + type + ' show';
  setTimeout(() => { toast.classList.remove('show'); }, 3000);
}

// ============================================================
// Date formatting helper: yyyy/mm/dd(曜日) hh:mm:ss
// ============================================================
const JP_DAY_NAMES = ['日', '月', '火', '水', '木', '金', '土'];

function formatDateJP(dateStr) {
  if (!dateStr || dateStr === '-') return '-';
  // Try to parse - supports "2026-04-01 12:30:00" or ISO format
  const d = new Date(dateStr.replace(' ', 'T'));
  if (isNaN(d.getTime())) return dateStr;
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  const dow = JP_DAY_NAMES[d.getDay()];
  const hh = String(d.getHours()).padStart(2, '0');
  const mi = String(d.getMinutes()).padStart(2, '0');
  const ss = String(d.getSeconds()).padStart(2, '0');
  return `${yyyy}/${mm}/${dd}(${dow}) ${hh}:${mi}:${ss}`;
}

let historyLoaded = false;
function initTabs() {
  document.querySelectorAll('.tab').forEach(tab => {

      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-' + tab.dataset.tab).classList.add('active');

      if (tab.dataset.tab === 'history' && !historyLoaded) {
        historyLoaded = true;
        loadHistory();
      }
    });
  });
}

function getSortedSchedule() {
  const sorted = [...shiftData.schedule];
  const col = scheduleSortState.column;
  const dir = scheduleSortState.direction === 'asc' ? 1 : -1;

  sorted.sort((a, b) => {
    let va, vb;
    switch (col) {
      case 'date': va = a.date + ' ' + (a.start||''); vb = b.date + ' ' + (b.start||''); break;
      case 'company': va = a.company || ''; vb = b.company || ''; break;
      case 'content': va = a.content || ''; vb = b.content || ''; break;
      case 'time': va = a.start || ''; vb = b.start || ''; break;
      case 'location': va = a.location || ''; vb = b.location || ''; break;
      case 'participants': va = a.participants || 0; vb = b.participants || 0; return (va - vb) * dir;
      case 'mainTeacher': va = a.mainTeacher || ''; vb = b.mainTeacher || ''; break;
      case 'teachers': va = (a.teachers || []).join(','); vb = (b.teachers || []).join(','); break;
      case 'rank': va = a.rank || ''; vb = b.rank || ''; break;
      case 'instNeeded': va = a.instNeeded || 0; vb = b.instNeeded || 0; return (va - vb) * dir;
      case 'assigned': va = a.assigned ? a.assigned.length : 0; vb = b.assigned ? b.assigned.length : 0; return (va - vb) * dir;
      case 'diff':
        va = (a.assigned ? a.assigned.length : 0) - a.instNeeded;
        vb = (b.assigned ? b.assigned.length : 0) - b.instNeeded;
        return (va - vb) * dir;
      default: va = a.date; vb = b.date;
    }
    return va < vb ? -dir : va > vb ? dir : 0;
  });
  return sorted;
}

function sortArrow(col) {
  if (scheduleSortState.column !== col) return '';
  return `<span class="sort-arrow">${scheduleSortState.direction === 'asc' ? '▲' : '▼'}</span>`;
}

function toggleSort(col) {
  if (scheduleSortState.column === col) {
    scheduleSortState.direction = scheduleSortState.direction === 'asc' ? 'desc' : 'asc';
  } else {
    scheduleSortState.column = col;
    scheduleSortState.direction = 'asc';
  }
  renderSchedule();
}

function renderConfirmStatus(s) {
  if (!s.assigned || s.assigned.length === 0) return '';
  const confirm = s.instConfirm || {};
  const statuses = s.assigned.map(n => confirm[n] || '未');
  const allOk = statuses.every(st => st === 'OK');
  const hasNg = statuses.some(st => st === 'NG');
  if (allOk) return '<span style="color:var(--green);font-weight:600;">確定</span>';
  if (hasNg) return '<span style="color:var(--red);font-weight:600;">NG有</span>';
  const okCount = statuses.filter(st => st === 'OK').length;
  return '<span style="color:var(--yellow);">' + okCount + '/' + statuses.length + '</span>';
}

function updateInstNeeded(idx, val) {
  const newVal = parseInt(val, 10);
  if (isNaN(newVal) || newVal < 0) return;
  if (shiftData.schedule[idx].instNeeded !== newVal) {
    shiftData.schedule[idx].instNeeded = newVal;
    markChanged();
    renderSchedule();
    refreshSummary();
  }
}

// Availability Matrix
// ============================================================
const AVAIL_STATES = ['', '全日(出張OK)', '全日(出張NG)', 'AM', 'PM', '保留', 'NG', '未回答'];
const AVAIL_LABELS = { '': '', '全日': '全日', '全日(出張OK)': '出張OK', '全日(出張NG)': '出張NG', 'AM': 'AM', 'PM': 'PM', '保留': '保留', 'NG': 'NG', '未回答': '未回答' };
const AVAIL_CLASSES = { '': 'avail-empty', '全日': 'avail-full', '全日(出張OK)': 'avail-full-ok', '全日(出張NG)': 'avail-full-ng', 'AM': 'avail-am', 'PM': 'avail-pm', '保留': 'avail-hold', 'NG': 'avail-ng', '未回答': 'avail-pending' };
// 「全日」系の判定ヘルパー (出張OK/NG両方を受ける)。既存「全日」値(4月データ等)も包含
const isFullDay = v => v === '全日' || v === '全日(出張OK)' || v === '全日(出張NG)';
let availFilterDate = null; // null = show all, string = filter by date

function renderAvailability() {
  const d = shiftData;
  const panel = document.getElementById('panel-availability');
  const dates = d.schedule;  // Campがある全日を表示 (instNeeded==0も含む)

  if (dates.length === 0) {
    panel.innerHTML = '<p style="color:var(--text2);padding:20px;">インストが必要な日程がありません。</p>';
    return;
  }

  // Deduplicate dates (multiple sessions on same date)
  const uniqueDates = [];
  const seenDates = new Set();
  dates.forEach(s => {
    if (!seenDates.has(s.date)) {
      seenDates.add(s.date);
      uniqueDates.push({ date: s.date, dow: s.dow });
    }
  });

  // Group instructors by type
  const groups = [
    { label: '社内インターン', instructors: d.instructors.filter(i => i.type === '社内インターン') },
    { label: '外部委託', instructors: d.instructors.filter(i => i.type === '外部委託') },
  ].filter(g => g.instructors.length > 0);

  const filterActive = availFilterDate !== null;
  const filterLabel = filterActive
    ? `<span style="margin-left:12px;font-size:13px;color:var(--blue);cursor:pointer;" onclick="clearAvailFilter()">🔍 ${availFilterDate.slice(5)} のNG以外を表示中 ✕ 解除</span>`
    : '<span style="margin-left:12px;font-size:12px;color:var(--text3);">※ 日付ヘッダーをクリックで絞り込み</span>';

  let html = `<div class="section">
    <div class="legend">
      <span class="legend-item"><span class="avail-cell avail-full-ok" style="display:inline-flex;width:52px;height:24px;font-size:10px;padding:0 4px;">出張OK</span> 全日(出張OK)</span>
      <span class="legend-item"><span class="avail-cell avail-full-ng" style="display:inline-flex;width:52px;height:24px;font-size:10px;padding:0 4px;">出張NG</span> 全日(出張NG)</span>
      <span class="legend-item"><span class="avail-cell avail-am" style="display:inline-flex;width:32px;height:24px;font-size:10px;">AM</span> 午前</span>
      <span class="legend-item"><span class="avail-cell avail-pm" style="display:inline-flex;width:32px;height:24px;font-size:10px;">PM</span> 午後</span>
      <span class="legend-item"><span class="avail-cell avail-hold" style="display:inline-flex;width:40px;height:24px;font-size:10px;">保留</span> 保留</span>
      <span class="legend-item"><span class="avail-cell avail-ng" style="display:inline-flex;width:32px;height:24px;font-size:10px;">NG</span> 不可</span>
      <span class="legend-item"><span class="avail-cell avail-pending" style="display:inline-flex;width:52px;height:24px;font-size:10px;padding:0 4px;">未回答</span> 未回答</span>
      <span class="legend-item"><span class="avail-cell avail-empty" style="display:inline-flex;width:32px;height:24px;font-size:10px;">-</span> 該当なし</span>
      ${filterLabel}
    </div>
    <div class="table-wrap" style="max-height:700px;overflow:auto;">
    <table class="data-table avail-table">
      <thead>
        <tr>
          <th style="text-align:left;min-width:120px;position:sticky;left:0;z-index:3;background:var(--card);">名前</th>
          ${uniqueDates.map(dt => {
            const isActive = availFilterDate === dt.date;
            const style = isActive ? 'background:var(--blue);color:#fff;cursor:pointer;' : 'cursor:pointer;';
            return `<th class="date-header" style="${style}" onclick="toggleAvailFilter('${dt.date}')">${dt.date.slice(5)}(${dt.dow})</th>`;
          }).join('')}
        </tr>
      </thead>
      <tbody>`;

  if (filterActive) {
    // Filter active: flatten all groups, filter NG, sort answered first then unanswered last
    let allFiltered = d.instructors.filter(inst => {
      const avail = (inst.availability && inst.availability[availFilterDate]) || '';
      return avail !== 'NG';
    });
    allFiltered.sort((a, b) => {
      const av = (a.availability && a.availability[availFilterDate]) || '';
      const bv = (b.availability && b.availability[availFilterDate]) || '';
      if (av && !bv) return -1;
      if (!av && bv) return 1;
      return 0;
    });
    allFiltered.forEach(inst => {
      const iIdx = d.instructors.indexOf(inst);
      html += `<tr><td class="avail-name-cell clickable-name" onclick="openAvailabilityModal(${iIdx})">${inst.name}</td>`;
      uniqueDates.forEach(dt => {
        const avail = (inst.availability && inst.availability[dt.date]) || '';
        const cls = AVAIL_CLASSES[avail] || 'avail-empty';
        const label = AVAIL_LABELS[avail] || '-';
        html += `<td><div class="avail-cell ${cls}" data-inst="${iIdx}" data-date="${dt.date}" onclick="cycleAvail(this)">${label}</div></td>`;
      });
      html += '</tr>';
    });
  } else {
    // No filter: group by type, unanswered at bottom of each group
    groups.forEach(group => {
      let sortedInstructors = [...group.instructors];
      sortedInstructors.sort((a, b) => {
        const aHas = uniqueDates.some(dt => { const v = (a.availability && a.availability[dt.date]) || ''; return v !== ''; });
        const bHas = uniqueDates.some(dt => { const v = (b.availability && b.availability[dt.date]) || ''; return v !== ''; });
        if (aHas && !bHas) return -1;
        if (!aHas && bHas) return 1;
        return 0;
      });
      html += `<tr class="avail-group-header"><td colspan="${uniqueDates.length + 1}">${group.label}（${group.instructors.length}名）</td></tr>`;
      sortedInstructors.forEach(inst => {
        const iIdx = d.instructors.indexOf(inst);
        html += `<tr><td class="avail-name-cell clickable-name" onclick="openAvailabilityModal(${iIdx})">${inst.name}</td>`;

          html += `<td><div class="avail-cell ${cls}" data-inst="${iIdx}" data-date="${dt.date}" onclick="cycleAvail(this)">${label}</div></td>`;
        });
        html += '</tr>';
      });

  }

  html += '</tbody></table></div></div>';
  panel.innerHTML = html;

function renderModalConfirmTags(s, schedIdx) {
  if (!s.assigned || s.assigned.length === 0) return '<span style="color:var(--text3);font-size:12px;">配置なし</span>';
  const confirm = s.instConfirm || {};

  const bgMap = { '未': 'var(--bg)', '確認中': 'rgba(210,153,34,0.15)', 'OK': 'rgba(63,185,80,0.15)', 'NG': 'rgba(248,81,73,0.15)' };

function cycleInstConfirm(schedIdx, name) {
  const s = shiftData.schedule[schedIdx];
  if (!s.instConfirm) s.instConfirm = {};
  const cycle = ['未', '確認中', 'OK', 'NG'];
  const current = s.instConfirm[name] || '未';
  const next = cycle[(cycle.indexOf(current) + 1) % cycle.length];
  s.instConfirm[name] = next;
  markChanged();
  afterModalEdit();
  refreshModal(openScheduleModal, schedIdx);
}

function toggleAvailFilter(date) {

function cycleAvail(el) {
  const instIdx = parseInt(el.dataset.inst);
  const dateKey = el.dataset.date;
  const inst = shiftData.instructors[instIdx];
  if (!inst.availability) inst.availability = {};

  const current = inst.availability[dateKey] || '';
  const idx = AVAIL_STATES.indexOf(current);
  const next = AVAIL_STATES[(idx + 1) % AVAIL_STATES.length];

  if (next === '') {
    delete inst.availability[dateKey];
  } else {
    inst.availability[dateKey] = next;
  }

  const cls = AVAIL_CLASSES[next] || 'avail-empty';
  const label = AVAIL_LABELS[next] || '-';
  el.className = 'avail-cell ' + cls;
  el.textContent = label;
  markChanged();
  renderCalendar();
}

// Calendar View (Sunday start + narrow weekends)
// ============================================================
function renderCalendar() {
  const panel = document.getElementById('panel-calendar');
  const [yearStr, monthStr] = (currentMonthKey || '2026-04').split('-');
  const year = parseInt(yearStr, 10);
  const month = parseInt(monthStr, 10);

  const firstDay = new Date(year, month - 1, 1);
  const lastDay = new Date(year, month, 0);
  const daysInMonth = lastDay.getDate();

  // Sunday = 0 (native JS getDay), use as-is for Sun-start calendar
  const startDow = firstDay.getDay(); // 0=Sun, 1=Mon, ..., 6=Sat

  const dayNames = ['日', '月', '火', '水', '木', '金', '土'];
  const dayClasses = ['calendar-header-sun', '', '', '', '', '', 'calendar-header-sat'];

  // Build schedule lookup
  const scheduleLookup = {};
  shiftData.schedule.forEach(s => {
    const day = parseInt(s.date.split('-')[2], 10);
    if (!scheduleLookup[day]) scheduleLookup[day] = [];
    scheduleLookup[day].push(s);
  });

  let html = `<div class="section">
    <div class="calendar-month-nav">
      <span>${year}年 ${month}月</span>
    </div>
    <div class="calendar-grid">`;

  dayNames.forEach((d, i) => { html += `<div class="calendar-header ${dayClasses[i]}">${d}</div>`; });

  // Empty cells before first day
  for (let i = 0; i < startDow; i++) {
    html += '<div class="calendar-cell empty"></div>';
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const events = scheduleLookup[day] || [];
    let cellContent = `<div class="calendar-day">${day}</div>`;

    events.forEach(ev => {
      const assigned = ev.assigned ? ev.assigned.length : 0;
      const needed = ev.instNeeded;
      let colorClass;
      if (needed === 0) { colorClass = 'cal-gray'; }
      else if (assigned >= needed) { colorClass = 'cal-green'; }
      else if (assigned > 0) { colorClass = 'cal-yellow'; }
      else { colorClass = 'cal-red'; }

      const timeStr = `${ev.start}-${ev.end}`;
      const pCount = ev.participants > 0 ? `${ev.participants}名` : '';
      cellContent += `<div class="calendar-event ${colorClass}" title="${ev.company} ${timeStr} ${pCount} (${assigned}/${needed})">`;
      cellContent += `<span style="font-size:9px;opacity:0.8;">${timeStr}</span> ${ev.company}`;
      if (pCount) cellContent += ` <span style="font-size:9px;opacity:0.7;">${pCount}</span>`;
      if (needed > 0) cellContent += ` <span style="font-size:9px;font-weight:600;">${assigned}/${needed}</span>`;
      cellContent += `</div>`;
    });

    html += `<div class="calendar-cell clickable-day" onclick="openCalendarDayModal(${day})">${cellContent}</div>`;
  }

  // Fill remaining cells
  const totalCells = startDow + daysInMonth;
  const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (let i = 0; i < remaining; i++) {
    html += '<div class="calendar-cell empty"></div>';
  }

  html += '</div></div>';
  panel.innerHTML = html;
}

// Check if an instructor is teaching at a TIME-OVERLAPPING session on the same date
// (午前講師・午後インストラクター等、時間が被らなければOK)
function isTeachingOnDate(instName, date, targetSession) {
  return shiftData.schedule.some(s => {
    if (s.date !== date || !s.teachers || !s.teachers.includes(instName)) return false;
    if (!targetSession) return true;
    return timesOverlap(targetSession.start, targetSession.end, s.start, s.end);
  });
}

// Check if two time ranges overlap (HH:MM format)
function timesOverlap(start1, end1, start2, end2) {
  const toMin = t => { const [h,m] = t.split(':').map(Number); return h * 60 + m; };
  return toMin(start1) < toMin(end2) && toMin(start2) < toMin(end1);
}

// Collect names assigned to sessions that overlap with the given session (same date, time conflict)
function getConflictingAssigned(targetSession) {
  const conflicts = new Set();
  shiftData.schedule.forEach(sc => {
    if (sc.date === targetSession.date && sc !== targetSession) {
      if (timesOverlap(targetSession.start, targetSession.end, sc.start, sc.end)) {
        (sc.assigned || []).forEach(n => conflicts.add(n));
      }
    }
  });
  return conflicts;
}

function showAssignDropdown(event, schedIdx) {
  event.stopPropagation();
  // Toggle: if already open, close it
  if (activeAssignDropdown) { closeAssignDropdown(); return; }

  const s = shiftData.schedule[schedIdx];
  const assigned = s.assigned || [];

  // Collect names assigned to time-overlapping sessions (same date, time conflict only)
  const conflicting = getConflictingAssigned(s);
  const available = shiftData.instructors
    .filter(inst => { const a = inst.availability && inst.availability[s.date]; return a !== 'NG' && a !== '未回答'; })
    .map(inst => inst.name)
    .filter(name => !assigned.includes(name))
    .filter(name => !conflicting.has(name))
    .filter(name => !isTeachingOnDate(name, s.date, s));

  if (available.length === 0) {
    showToast('配置可能なインストラクターがいません', 'error');
    return;
  }

  const dropdown = document.createElement('div');
  dropdown.className = 'modal-dropdown';

  available.forEach(name => {
    const item = document.createElement('div');
    item.className = 'modal-dropdown-item';
    item.textContent = name;
    item.onclick = (e) => {
      e.stopPropagation();
      addAssigned(schedIdx, name);
      closeAssignDropdown();
    };
    dropdown.appendChild(item);
  });

  const tagsContainer = event.target.closest('.assign-tags');
  tagsContainer.insertAdjacentElement('afterend', dropdown);
  activeAssignDropdown = dropdown;

  // Close on outside click
  setTimeout(() => {
    document.addEventListener('click', closeAssignDropdownOnOutside);
  }, 0);
  updateModalOpenState();
}

function closeAssignDropdownOnOutside(e) {
  if (activeAssignDropdown && !activeAssignDropdown.contains(e.target)) {
    closeAssignDropdown();
  }
}

function closeAssignDropdown() {
  if (activeAssignDropdown) {
    activeAssignDropdown.remove();
    activeAssignDropdown = null;
    document.removeEventListener('click', closeAssignDropdownOnOutside);
    updateModalOpenState();
  }
}

function addAssigned(schedIdx, name) {
  if (!shiftData.schedule[schedIdx].assigned) {
    shiftData.schedule[schedIdx].assigned = [];
  }
  if (!shiftData.schedule[schedIdx].assigned.includes(name)) {
    shiftData.schedule[schedIdx].assigned.push(name);
    markChanged();
    renderAssignment();
    renderSchedule();
    renderCalendar();
    refreshSummary();
  }
}

function removeAssigned(schedIdx, tagIdx) {
  if (shiftData.schedule[schedIdx].assigned) {
    shiftData.schedule[schedIdx].assigned.splice(tagIdx, 1);
    markChanged();
    renderAssignment();
    renderSchedule();
    renderCalendar();
    refreshSummary();
  }
}

// ============================================================
// Auto-Assignment Suggestion
// ============================================================
let suggestFilterDate = null;

function toggleSuggestFilter(date) {
  // 再描画前にスクロール位置を保存(クリック時に戻る問題の対処)
  const left = document.querySelector('.suggest-left');
  const right = document.querySelector('.suggest-right');
  const leftScroll = left ? { top: left.scrollTop, left: left.scrollLeft } : null;
  const rightScroll = right ? { top: right.scrollTop, left: right.scrollLeft } : null;

  suggestFilterDate = (suggestFilterDate === date) ? null : date;
  renderSuggestPanel();

  // 再描画後に復元
  requestAnimationFrame(() => {
    const newLeft = document.querySelector('.suggest-left');
    if (newLeft && leftScroll) { newLeft.scrollTop = leftScroll.top; newLeft.scrollLeft = leftScroll.left; }
    const newRight = document.querySelector('.suggest-right');
    if (newRight && rightScroll) { newRight.scrollTop = rightScroll.top; newRight.scrollLeft = rightScroll.left; }
  });
}

function renderSuggestPanel() {
  const panel = document.getElementById('panel-suggest');
  const d = shiftData;

  // --- Status summary ---
  let okCount = 0, warnCount = 0, ngCount = 0;
  d.schedule.filter(s => s.instNeeded > 0).forEach(s => {
    const assigned = (s.assigned || []).length;
    if (assigned >= s.instNeeded) okCount++;
    else if (assigned > 0) warnCount++;
    else ngCount++;
  });

  // --- Mini availability matrix (left side) ---
  const dates = d.schedule;  // Campがある全日を表示 (instNeeded==0も含む)
  const uniqueDates = [];
  const seenDates = new Set();
  dates.forEach(s => { if (!seenDates.has(s.date)) { seenDates.add(s.date); uniqueDates.push({ date: s.date, dow: s.dow }); } });

  // Build assignment lookup
  const assignmentMap = {};
  const teacherMap = {};
  d.schedule.forEach(s => {
    const key = s.date;
    if (!assignmentMap[key]) assignmentMap[key] = new Set();
    if (!teacherMap[key]) teacherMap[key] = new Set();
    (s.assigned || []).forEach(n => assignmentMap[key].add(n));
    (s.teachers || []).forEach(n => teacherMap[key].add(n));
  });

  // Filter label
  const filterActive = suggestFilterDate !== null;
  const filterLabel = filterActive
    ? `<span style="font-size:12px;color:var(--blue);cursor:pointer;" onclick="toggleSuggestFilter(null)">🔍 ${suggestFilterDate.slice(5)} のNG以外を表示中 ✕</span>`
    : '<span style="font-size:11px;color:var(--text3);">※ 日付をクリックで絞り込み</span>';

  // Build matrix - filter instructors if date filter active
  let matrixHtml = `<table class="suggest-mini-matrix"><thead><tr><th>名前</th>`;
  uniqueDates.forEach(dt => {
    const isActive = suggestFilterDate === dt.date;
    const style = isActive ? 'background:var(--blue);color:#fff;cursor:pointer;' : 'cursor:pointer;';
    matrixHtml += `<th style="${style}" onclick="toggleSuggestFilter('${dt.date}')">${dt.date.slice(5)}<br>(${dt.dow})</th>`;
  });
  matrixHtml += '</tr></thead><tbody>';

  // Group instructors by type (same as availability tab)
  const groups = [
    { label: '社内インターン', instructors: d.instructors.filter(i => i.type === '社内インターン') },
    { label: '外部委託', instructors: d.instructors.filter(i => i.type === '外部委託') },
  ].filter(g => g.instructors.length > 0);

  // Helper to render one instructor row in mini matrix
  function renderMiniRow(inst) {
    let row = `<tr><td class="avail-name-cell">${inst.name}</td>`;
    uniqueDates.forEach(dt => {
      const avail = (inst.availability && inst.availability[dt.date]) || '';
      const isAssigned = assignmentMap[dt.date] && assignmentMap[dt.date].has(inst.name);
      const isTeacher = teacherMap[dt.date] && teacherMap[dt.date].has(inst.name);
      let cls = '', label = '-';
      if (isTeacher) { cls = 'teacher-mark'; label = '講師'; }
      else if (isAssigned) { cls = 'assigned-mark'; label = '配置'; }
      else if (avail === '全日(出張OK)' || avail === '全日') { cls = 'avail-full-ok'; label = '出張OK'; }
      else if (avail === '全日(出張NG)') { cls = 'avail-full-ng'; label = '出張NG'; }
      else if (avail === 'AM') { cls = 'avail-am'; label = 'AM'; }
      else if (avail === 'PM') { cls = 'avail-pm'; label = 'PM'; }
      else if (avail === '保留') { cls = 'avail-hold'; label = '保留'; }
      else if (avail === 'NG') { cls = 'avail-ng'; label = 'NG'; }
      else if (avail === '未回答') { cls = 'avail-pending'; label = '未回答'; }
      else { cls = 'avail-empty'; }
      row += `<td><div class="avail-cell ${cls}" style="width:32px;height:22px;font-size:10px;margin:auto;">${label}</div></td>`;
    });
    row += '</tr>';
    return row;
  }

  if (filterActive) {
    // Filter: flatten all groups, no grouping headers, answered first / unanswered last
    let allFiltered = d.instructors.filter(inst => {
      const avail = (inst.availability && inst.availability[suggestFilterDate]) || '';
      return avail !== 'NG';
    });
    allFiltered.sort((a, b) => {
      const av = (a.availability && a.availability[suggestFilterDate]) || '';
      const bv = (b.availability && b.availability[suggestFilterDate]) || '';
      if (av && !bv) return -1;
      if (!av && bv) return 1;
      return 0;
    });
    allFiltered.forEach(inst => { matrixHtml += renderMiniRow(inst); });
  } else {
    // No filter: group by type, unanswered at bottom within each group
    groups.forEach(group => {
      let sorted = [...group.instructors];
      sorted.sort((a, b) => {
        const aHas = uniqueDates.some(dt => { const v = (a.availability && a.availability[dt.date]) || ''; return v !== ''; });
        const bHas = uniqueDates.some(dt => { const v = (b.availability && b.availability[dt.date]) || ''; return v !== ''; });
        if (aHas && !bHas) return -1;
        if (!aHas && bHas) return 1;
        return 0;
      });
      matrixHtml += `<tr class="avail-group-header"><td colspan="${uniqueDates.length + 1}" style="font-size:11px;padding:4px 6px;">${group.label}（${group.instructors.length}名）</td></tr>`;
      sorted.forEach(inst => { matrixHtml += renderMiniRow(inst); });
    });
  }
  matrixHtml += '</tbody></table>';

  panel.innerHTML = `<div class="section">
    <div class="suggest-status-bar">
      <span class="suggest-stat ok">充足 ${okCount}件</span>
      <span class="suggest-stat warn">一部不足 ${warnCount}件</span>
      <span class="suggest-stat ng">未配置 ${ngCount}件</span>
    </div>
    <div class="suggest-split">
      <div class="suggest-left">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
          <span style="font-weight:600;font-size:14px;color:var(--text);">可用性マトリクス</span>
          ${filterLabel}
        </div>
        <div style="font-size:11px;color:var(--text3);margin-bottom:8px;">
          <span style="color:var(--blue);">■配置</span>
          <span style="color:var(--purple);">■講師</span>
          <span style="color:var(--green);">■全日</span>
          <span style="color:#58a6ff;">■AM</span>
          <span style="color:#bc8cff;">■PM</span>
          <span style="color:var(--red);">■NG</span>
        </div>
        ${matrixHtml}
      </div>
      <div class="suggest-right">
        ${buildSuggestRightHtml(d)}
      </div>
    </div>
  </div>`;
}

function buildSuggestRightHtml(d) {
  let allSessions = d.schedule;  // Campがある全セッションを表示 (instNeeded==0も含む)
  if (suggestFilterDate) {
    allSessions = allSessions.filter(s => s.date === suggestFilterDate);
  }

  if (allSessions.length === 0) {
    return '<p style="color:var(--text2);padding:16px;">Campの予定がありません。</p>';
  }

  let html = '<div class="suggestion-list">';
  allSessions.forEach(s => {
    const schedIdx = d.schedule.indexOf(s);
    const currentAssigned = s.assigned || [];
    const currentTeachers = s.teachers || [];
    const assigned = currentAssigned.length;
    const needed = s.instNeeded - assigned;
    const statusCls = needed <= 0 ? 'ok' : assigned > 0 ? 'warn' : 'ng';
    const statusLabel = needed <= 0 ? '充足' : `不足${needed}名`;

    const startH = parseInt(s.start.split(':')[0], 10);
    const endH = parseInt(s.end.split(':')[0], 10);
    const isAM = endH <= 13;
    const isPM = startH >= 12;
    const conflicting = getConflictingAssigned(s);

    const candidates = d.instructors.filter(inst => {
      if (currentAssigned.includes(inst.name)) return false;
      if (isTeachingOnDate(inst.name, s.date, s)) return false;
      if (conflicting.has(inst.name)) return false;
      const avail = inst.availability && inst.availability[s.date];
      if (!avail || avail === 'NG' || avail === '未回答') return false;
      if (isFullDay(avail)) return true;
      // AMのみ人 → sessionがAM内に収まる場合のみ候補
      if (avail === 'AM' && isAM) return true;
      // PMのみ人 → sessionがPM内に収まる場合のみ候補
      if (avail === 'PM' && isPM) return true;
      // 保留 → 終日/AM/PMすべて候補(野沢判断)
      if (avail === '保留') return true;
      return false;
    });

    const locHtml = s.location ? `<span style="color:var(--text2);font-size:11px;margin-left:6px;">📍 ${escapeHtml(s.location)}</span>` : '';
    html += `<div class="suggestion-item" style="flex-direction:column;align-items:stretch;cursor:pointer;" onclick="openScheduleFromSuggest(${schedIdx})">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
        <div class="suggestion-info">
          <div class="suggestion-date">${s.date}(${s.dow}) ${s.start}-${s.end}${locHtml}</div>
          <div class="suggestion-detail">${s.company} / ${s.content} / 必要: ${s.instNeeded}名</div>
        </div>
        <span class="suggest-stat ${statusCls}" style="font-size:11px;padding:3px 10px;">${statusLabel}</span>
      </div>
      ${currentTeachers.length > 0 ? `<div class="suggestion-current"><span style="font-size:11px;color:var(--text3);">講師:</span>${currentTeachers.map(n => `<span class="suggestion-teacher-name">${n}</span>`).join('')}</div>` : ''}
      ${currentAssigned.length > 0 ? `<div class="suggestion-current"><span style="font-size:11px;color:var(--text3);">配置済:</span>${currentAssigned.map(n => `<span class="suggestion-current-name">${n}</span>`).join('')}</div>` : ''}
      <div style="margin-top:4px;display:flex;gap:4px;flex-wrap:wrap;">
        <span style="font-size:11px;color:var(--text3);">候補:</span>
        ${candidates.length > 0
          ? candidates.map(inst => {
              const avail = (inst.availability && inst.availability[s.date]) || '';
              const availColor = isFullDay(avail) ? 'var(--green)' : avail === 'AM' ? 'var(--blue)' : 'var(--purple)';
              return `<span style="font-size:11px;color:${availColor};">${inst.name}</span>`;
            }).join('<span style="color:var(--text3);font-size:10px;">/</span>')
          : '<span style="color:var(--red);font-size:11px;">なし</span>'}
      </div>
    </div>`;
  });
  html += '</div>';
  return html;
}

function openScheduleFromSuggest(schedIdx) {
  window._suggestReturnActive = true;
  openScheduleModal(schedIdx);

// モーダル表示中の背景操作をブロック (capture phase、全keydownより先に走る)
document.addEventListener('keydown', (e) => {
  if (!document.body.classList.contains('modal-open')) return;
  // モーダル内にフォーカスがあれば通常処理 (input/textarea/button内での矢印やスペース等は許可)
  const modalRoot = e.target.closest('#modalOverlay, #exportModal, #shortcutHelpModal, .modal-dropdown, .assign-dropdown');
  if (modalRoot) return;
  // 背景のスクロール/移動系ショートカットを無効化
  const blockKeys = ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','PageUp','PageDown','Home','End',' ','Enter'];
  if (blockKeys.includes(e.key)) {
    e.preventDefault();
    e.stopPropagation();
  }
  // 文字キーも含めた Alt/Ctrl なしの単体キーショートカットを止める (タブ切替のg等)
  if (!e.altKey && !e.ctrlKey && !e.metaKey && e.key.length === 1 && e.key !== 'Escape') {
    e.stopPropagation();
  }
}, true);

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    // Close dropdowns first, then modal
    if (activeAssignDropdown) { closeAssignDropdown(); return; }
    if (activeModalDropdown) { closeModalDropdown(); return; }
    // If opened from timeline, go back to timeline
    if (_timelineReturnDay !== null) {
      const returnDay = _timelineReturnDay;
      _timelineReturnDay = null;
      openCalendarDayModal(returnDay);
      return;
    }
    document.getElementById('modalOverlay').classList.remove('active');
  }
  // Alt + Left/Right: switch tabs
  if (e.altKey && (e.key === 'ArrowUp' || e.key === 'ArrowDown')) {
    e.preventDefault();
    const tabs = Array.from(document.querySelectorAll('.tab'));
    if (tabs.length === 0) return;
    const activeIdx = tabs.findIndex(t => t.classList.contains('active'));
    let nextIdx;
    if (e.key === 'ArrowDown') {
      nextIdx = (activeIdx + 1) % tabs.length;
    } else {
      nextIdx = (activeIdx - 1 + tabs.length) % tabs.length;
    }
    tabs[nextIdx].click();
    tabs[nextIdx].focus();
  }
  // Alt + 1-7: jump to tab by number
  if (e.altKey && e.key >= '1' && e.key <= '7') {
    e.preventDefault();
    const tabs = Array.from(document.querySelectorAll('.tab'));
    const idx = parseInt(e.key, 10) - 1;
    if (idx < tabs.length) {
      tabs[idx].click();
      tabs[idx].focus();
    }
  }
});

// Helper: refresh a modal in-place (re-call same open function)
function refreshModal(openFn, ...args) {
  openFn(...args);
}

  refreshSummary();
  renderSchedule();
  renderContact();
  renderAssignment();

}

// Helper: show modal assign dropdown
let activeModalDropdown = null;

function closeModalDropdown() {
  if (activeModalDropdown) {
    activeModalDropdown.remove();
    activeModalDropdown = null;
    document.removeEventListener('click', closeModalDropdownOnOutside);
    updateModalOpenState();
  }
}

function closeModalDropdownOnOutside(e) {
  if (activeModalDropdown && !activeModalDropdown.contains(e.target)) {
    closeModalDropdown();
  }
}

function showModalAssignDropdown(event, schedIdx, reopenFn, ...reopenArgs) {
  event.stopPropagation();
  // Toggle: if already open, close it
  if (activeModalDropdown) { closeModalDropdown(); return; }

  const s = shiftData.schedule[schedIdx];
  const assigned = s.assigned || [];
  // Collect names assigned to time-overlapping sessions (same date, time conflict only)
  const conflicting = getConflictingAssigned(s);
  const available = shiftData.instructors
    .filter(inst => { const a = inst.availability && inst.availability[s.date]; return a !== 'NG' && a !== '未回答'; })
    .filter(inst => !assigned.includes(inst.name))
    .filter(inst => !conflicting.has(inst.name))
    .filter(inst => !isTeachingOnDate(inst.name, s.date, s));

  if (available.length === 0) {
    showToast('配置可能なインストラクターがいません', 'error');
    return;
  }

  // availabilityの優先順で並べる(全日OK→全日NG→AM→PM→保留)
  const AVAIL_PRIO = {'全日(出張OK)':0, '全日':1, '全日(出張NG)':2, 'AM':3, 'PM':4, '保留':5};
  available.sort((a, b) => {
    const av = (a.availability && a.availability[s.date]) || '';
    const bv = (b.availability && b.availability[s.date]) || '';
    return (AVAIL_PRIO[av] ?? 99) - (AVAIL_PRIO[bv] ?? 99);
  });

  const dropdown = document.createElement('div');
  dropdown.className = 'modal-dropdown';

  available.forEach(inst => {
    const name = inst.name;
    const avail = (inst.availability && inst.availability[s.date]) || '';
    const label = AVAIL_LABELS[avail] || '';
    const cls = AVAIL_CLASSES[avail] || '';
    const item = document.createElement('div');
    item.className = 'modal-dropdown-item';
    item.innerHTML = `<span>${escapeHtml(name)}</span>` +
      (label ? `<span class="avail-cell ${cls}" style="display:inline-flex;min-width:auto;height:18px;font-size:10px;padding:0 6px;margin-left:8px;">${label}</span>` : '');
    item.onclick = (e) => {
      e.stopPropagation();
      if (!shiftData.schedule[schedIdx].assigned) shiftData.schedule[schedIdx].assigned = [];
      if (!shiftData.schedule[schedIdx].assigned.includes(name)) {
        shiftData.schedule[schedIdx].assigned.push(name);
        markChanged();
        afterModalEdit();
        refreshModal(reopenFn, ...reopenArgs);
      }
      closeModalDropdown();
    };
    dropdown.appendChild(item);
  });

  // Insert dropdown after the add button's parent container
  const tagsContainer = event.target.closest('.modal-assign-tags') || event.target.parentElement;
  tagsContainer.insertAdjacentElement('afterend', dropdown);
  activeModalDropdown = dropdown;
  updateModalOpenState();

  setTimeout(() => {
    document.addEventListener('click', closeModalDropdownOnOutside);
  }, 0);
}

function modalRemoveAssigned(schedIdx, tagIdx, reopenFn, ...reopenArgs) {
  if (shiftData.schedule[schedIdx].assigned) {
    shiftData.schedule[schedIdx].assigned.splice(tagIdx, 1);
    markChanged();
    afterModalEdit();
    refreshModal(reopenFn, ...reopenArgs);
  }
}

// Cycle availability from within modal
function cycleModalAvail(instIdx, dateKey) {
  const inst = shiftData.instructors[instIdx];
  if (!inst.availability) inst.availability = {};
  const current = inst.availability[dateKey] || '';
  const idx = AVAIL_STATES.indexOf(current);
  const next = AVAIL_STATES[(idx + 1) % AVAIL_STATES.length];
  if (next === '') {

  afterModalEdit();

// -- Assignment row modal (EDITABLE) --
function openAssignmentModal(schedIdx) {
  const s = shiftData.schedule[schedIdx];
  const teacherNames = s.teachers && s.teachers.length > 0 ? s.teachers.join(', ') : '-';

  // Build assigned tags (removable)
  const assignedTags = (s.assigned || []).map((name, tagIdx) =>
    `<span class="modal-assign-tag">${escapeHtml(name)}<span class="modal-remove-tag" onclick="event.stopPropagation();modalRemoveAssigned(${schedIdx}, ${tagIdx}, openAssignmentModal, ${schedIdx})">&times;</span></span>`
  ).join('') || '<span style="color:var(--text3);font-size:12px;">なし</span>';

  // Find available instructors for this date/time
  const startH = parseInt(s.start.split(':')[0], 10);
  const endH = parseInt(s.end.split(':')[0], 10);
  const isAM = endH <= 13;
  const isPM = startH >= 12;

  let availableHtml = '';
  shiftData.instructors.forEach(inst => {
    const avail = inst.availability && inst.availability[s.date];
    if (!avail || avail === 'NG' || avail === '未回答') return;
    let canWork = false;
    if (isFullDay(avail)) canWork = true;
    else if (avail === 'AM' && isAM) canWork = true;  // AMのみ → AM内セッションのみ可
    else if (avail === 'PM' && isPM) canWork = true;  // PMのみ → PM内セッションのみ可
    else if (avail === '保留') canWork = true;

    if (canWork) {
      const isAssigned = s.assigned && s.assigned.includes(inst.name);
      const availColor = isFullDay(avail) ? 'var(--green)' : avail === 'AM' ? 'var(--blue)' : avail === 'PM' ? 'var(--purple)' : 'var(--yellow)';
      const assignedClass = isAssigned ? ' is-assigned' : '';
      const action = isAssigned
        ? `onclick="event.stopPropagation();modalRemoveAssignedByName(${schedIdx},'${escapeHtml(inst.name)}',openAssignmentModal,${schedIdx});"`
        : `onclick="event.stopPropagation();modalAddAssigned(${schedIdx},'${escapeHtml(inst.name)}',openAssignmentModal,${schedIdx});"`;
      const statusLabel = isAssigned ? ' (配置済 - クリックで解除)' : ' (クリックで追加)';
      availableHtml += `<div class="modal-inst-available${assignedClass}" ${action} style="margin-bottom:4px;">
        ${escapeHtml(inst.name)} <span style="color:${availColor};font-size:12px;">[${avail}]</span>
        <span style="font-size:10px;color:var(--text3);">${statusLabel}</span>
      </div>`;
    }
  });
  if (!availableHtml) availableHtml = '<span style="color:var(--text3);">なし</span>';

  const diff = (s.assigned ? s.assigned.length : 0) - s.instNeeded;
  let diffText, diffColor;
  if (s.instNeeded === 0) { diffText = '-'; diffColor = 'var(--text3)'; }
  else if (diff >= 0) { diffText = '+' + diff; diffColor = 'var(--green)'; }
  else { diffText = '' + diff; diffColor = 'var(--red)'; }

  const body = `
    <div class="detail-row"><span class="detail-label">日付</span><span class="detail-value">${escapeHtml(s.date)}(${escapeHtml(s.dow)})</span></div>
    <div class="detail-row"><span class="detail-label">時間</span><span class="detail-value">${escapeHtml(s.start)} - ${escapeHtml(s.end)}</span></div>
    <div class="detail-row"><span class="detail-label">顧客名</span><span class="detail-value">${escapeHtml(s.company)}</span></div>

    <div class="detail-row"><span class="detail-label">必要数</span><span class="detail-value">${s.instNeeded}</span></div>
    <div class="detail-row"><span class="detail-label">過不足</span><span class="detail-value" style="color:${diffColor};font-weight:700;">${diffText}</span></div>
    <div class="detail-row"><span class="detail-label">配置済み</span><span class="detail-value">
      <div class="modal-assign-tags">

        <span class="modal-add-btn" onclick="event.stopPropagation();showModalAssignDropdown(event, ${schedIdx}, openAssignmentModal, ${schedIdx})">+ 追加</span>

function modalAddAssigned(schedIdx, name, reopenFn, ...reopenArgs) {
  if (!shiftData.schedule[schedIdx].assigned) shiftData.schedule[schedIdx].assigned = [];

    shiftData.schedule[schedIdx].assigned.push(name);

// Helper: remove assigned by name from modal
function modalRemoveAssignedByName(schedIdx, name, reopenFn, ...reopenArgs) {
  if (shiftData.schedule[schedIdx].assigned) {
    const idx = shiftData.schedule[schedIdx].assigned.indexOf(name);

      shiftData.schedule[schedIdx].assigned.splice(idx, 1);
